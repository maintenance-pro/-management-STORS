<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART GESTION - Multi-Stores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                <i class="fas fa-wallet text-blue-400"></i> GESTION PRO
            </h1>
            <div class="flex gap-2">
                <button onclick="showTab('dashboard')" class="hover:bg-slate-700 px-4 py-2 rounded-lg transition-all">Dashboard</button>
                <button onclick="showTab('store1')" class="hover:bg-slate-700 px-4 py-2 rounded-lg transition-all">Ma7al 1</button>
                <button onclick="showTab('store2')" class="hover:bg-slate-700 px-4 py-2 rounded-lg transition-all">Ma7al 2</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        
        <div id="dashboard" class="tab-content">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Tableau de Bord Général</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <p class="text-sm text-gray-500 font-bold uppercase tracking-wider">Revenu Total (MAD)</p>
                    <p id="total-global" class="text-3xl font-black text-slate-900">0.00</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 border-l-4 border-l-blue-500">
                    <p class="text-sm text-gray-500 font-bold uppercase tracking-wider">Ma7al 1</p>
                    <p id="total-s1" class="text-3xl font-black text-blue-600">0.00</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 border-l-4 border-l-emerald-500">
                    <p class="text-sm text-gray-500 font-bold uppercase tracking-wider">Ma7al 2</p>
                    <p id="total-s2" class="text-3xl font-black text-emerald-600">0.00</p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-bold mb-4">Ventes par Magasin</h3>
                <div class="h-64">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <div id="store1" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4 text-blue-600 border-b pb-2">Nouvelle Vente - Ma7al 1</h3>
                    <div class="space-y-4">
                        <input type="text" id="art1" placeholder="Article" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-blue-400">
                        <input type="number" id="prx1" placeholder="Prix (MAD)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-blue-400">
                        <button onclick="saveVente(1)" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Valider</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border overflow-x-auto">
                    <h3 class="font-bold mb-4">Historique Ma7al 1</h3>
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-gray-50 text-gray-400 text-xs uppercase font-bold"><th class="p-3">Article</th><th class="p-3 text-right">Prix (MAD)</th></tr></thead>
                        <tbody id="list-s1"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="store2" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold mb-4 text-emerald-600 border-b pb-2">Nouvelle Vente - Ma7al 2</h3>
                    <div class="space-y-4">
                        <input type="text" id="art2" placeholder="Article" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-emerald-400">
                        <input type="number" id="prx2" placeholder="Prix (MAD)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-emerald-400">
                        <button onclick="saveVente(2)" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition">Valider</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border overflow-x-auto">
                    <h3 class="font-bold mb-4">Historique Ma7al 2</h3>
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-gray-50 text-gray-400 text-xs uppercase font-bold"><th class="p-3">Article</th><th class="p-3 text-right">Prix (MAD)</th></tr></thead>
                        <tbody id="list-s2"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6raIyBkIciCHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980",
            measurementId: "G-QZ9W62HWQS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global state for chart
        let chartInstance = null;

        // Function bach t-enregistrer
        window.saveVente = async (storeId) => {
            const art = document.getElementById(`art${storeId}`).value;
            const prx = document.getElementById(`prx${storeId}`).value;
            if(!art || !prx) return alert("Kteb sl3a o tmen!");

            try {
                await addDoc(collection(db, "ventes"), {
                    store: storeId,
                    nom: art,
                    prix: parseFloat(prx),
                    date: new Date()
                });
                document.getElementById(`art${storeId}`).value = '';
                document.getElementById(`prx${storeId}`).value = '';
            } catch(e) { console.error(e) }
        };

        // Real-time Update
        const q = query(collection(db, "ventes"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            let s1 = 0, s2 = 0;
            const list1 = document.getElementById('list-s1');
            const list2 = document.getElementById('list-s2');
            list1.innerHTML = ''; list2.innerHTML = '';

            snapshot.forEach((doc) => {
                const d = doc.data();
                const row = `<tr class="border-b hover:bg-gray-50"><td class="p-3">${d.nom}</td><td class="p-3 text-right font-bold">${d.prix} MAD</td></tr>`;
                
                if(d.store === 1) { s1 += d.prix; list1.innerHTML += row; }
                else { s2 += d.prix; list2.innerHTML += row; }
            });

            document.getElementById('total-s1').innerText = s1.toFixed(2) + " MAD";
            document.getElementById('total-s2').innerText = s2.toFixed(2) + " MAD";
            document.getElementById('total-global').innerText = (s1 + s2).toFixed(2) + " MAD";
            updateChart(s1, s2);
        });

        function updateChart(s1, s2) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ma7al 1', 'Ma7al 2'],
                    datasets: [{
                        data: [s1, s2],
                        backgroundColor: ['#2563eb', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });
        }
    </script>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
