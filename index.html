<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SMIA PRO | Management-Stors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2563eb; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; transition: all 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
        <div class="card w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-600">SMIA PRO</h1>
                <p class="text-gray-500">Maintenance Management System</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
                    <input type="password" id="password" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div id="loginError" class="text-red-500 text-sm hidden">Email ou mot de passe incorrect.</div>
                <button type="submit" class="w-full btn-primary font-bold text-lg">Se connecter</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden min-h-screen bg-gray-50">
        <nav class="bg-white shadow-md p-4 flex justify-between items-center px-8">
            <h2 class="text-xl font-bold text-blue-700"><i class="fas fa-tools mr-2"></i>SMIA PRO Dashboard</h2>
            <div class="flex items-center gap-4">
                <span id="userNameDisplay" class="font-medium text-gray-700"></span>
                <button onclick="logout()" class="text-red-500 hover:text-red-700 font-semibold"><i class="fas fa-sign-out-alt mr-1"></i>Déconnexion</button>
            </div>
        </nav>

        <main class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card bg-blue-50 border-l-4 border-blue-500">
                    <h3 class="text-gray-500 text-sm font-bold uppercase">Statut Système</h3>
                    <p class="text-2xl font-bold text-blue-600">Connecté</p>
                </div>
                <div class="card bg-green-50 border-l-4 border-green-500">
                    <h3 class="text-gray-500 text-sm font-bold uppercase">Rôle</h3>
                    <p id="userRoleDisplay" class="text-2xl font-bold text-green-600">--</p>
                </div>
                <div class="card bg-purple-50 border-l-4 border-purple-500">
                    <h3 class="text-gray-500 text-sm font-bold uppercase">Unité</h3>
                    <p id="userStoreDisplay" class="text-2xl font-bold text-purple-600">--</p>
                </div>
            </div>
            
            <div class="mt-10 card">
                <h3 class="text-xl font-bold mb-4">Bienvenue dans votre gestion de maintenance</h3>
                <p class="text-gray-600">L'interface complète de gestion des pièces et du stock est en cours de chargement...</p>
            </div>
        </main>
    </div>

    <script>
        // === CONFIGURATION FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcICHN5gOLGcc9128gOsTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",
            measurementId: "G-QZ9W62HWQS"
        };

        // Initialisation
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const rtdb = firebase.database();

        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');

        // --- FONCTION DE LECTURE DEPUIS REALTIME DATABASE ---
        async function loadUserFromRTDB(user) {
            try {
                const snapshot = await rtdb.ref('users/' + user.uid).once('value');
                if (snapshot.exists()) {
                    return snapshot.val();
                }
            } catch (e) {
                console.error("Erreur RTDB:", e);
            }
            return null;
        }

        // --- GESTION DE LA CONNEXION ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                errorDiv.classList.add('hidden');
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const userData = await loadUserFromRTDB(userCredential.user);

                if (userData) {
                    showDashboard(userData);
                } else {
                    await auth.signOut();
                    alert("Accès refusé : Identifiant non trouvé dans la base de données.");
                }
            } catch (error) {
                errorDiv.classList.remove('hidden');
                console.error(error);
            }
        });

        // --- AFFICHAGE DU DASHBOARD ---
        function showDashboard(userData) {
            document.getElementById('userNameDisplay').textContent = userData.name || "Utilisateur";
            document.getElementById('userRoleDisplay').textContent = userData.role || "N/A";
            document.getElementById('userStoreDisplay').textContent = userData.storeId || "N/A";
            
            authSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
        }

        // --- SURVEILLANCE DE L'ÉTAT DE CONNEXION ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userData = await loadUserFromRTDB(user);
                if (userData) {
                    showDashboard(userData);
                }
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // --- DÉCONNEXION ---
        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
