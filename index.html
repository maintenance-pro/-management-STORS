<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management-Stors | Diagnostic + Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100">

    <div id="app">
        <!-- Écran de connexion -->
        <div id="authSection" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-800 to-indigo-900">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
                <div class="text-center mb-6">
                    <i class="fas fa-warehouse text-5xl text-indigo-600"></i>
                    <h1 class="text-2xl font-bold">Management-Stors</h1>
                    <p class="text-gray-500">ERP Multi‑Magasin</p>
                </div>
                <div>
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-3" value="admin@store.com">
                    <input type="password" id="loginPassword" placeholder="Mot de passe" class="w-full p-3 border rounded-lg mb-4" value="admin123">
                    <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Connexion</button>
                </div>
                <div id="infoMessage" class="text-center text-sm mt-3 p-2 rounded-lg bg-gray-100 text-gray-700"></div>
            </div>
        </div>

        <!-- Dashboard (caché) -->
        <div id="dashboardSection" class="hidden">
            <div class="bg-white shadow px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold">✅ Dashboard Administrateur</h1>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1 rounded-lg">Déconnexion</button>
            </div>
            <div class="p-6">
                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-2xl font-bold">Bienvenue, <span id="userNameSpan"></span> !</h2>
                    <p class="text-green-600 mt-2">Accès super_admin accordé.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcIHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980"
        };

        // Initialisation
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Éléments DOM
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const infoMessage = document.getElementById('infoMessage');

        function setMessage(msg, isError = false) {
            infoMessage.innerText = msg;
            infoMessage.className = "text-center text-sm mt-3 p-2 rounded-lg " + (isError ? "bg-red-100 text-red-700" : "bg-green-100 text-green-700");
            console.log(msg);
        }

        // ========== 1. Création automatique du Super Admin ==========
        async function ensureSuperAdminExists() {
            setMessage("🔍 Vérification de la base de données...");
            try {
                // Tester la connexion à la base : lire la racine
                const rootTest = await db.ref('.info/connected').once('value');
                if (!rootTest.val()) {
                    setMessage("❌ Impossible de se connecter à Realtime Database. Vérifiez les règles de sécurité.", true);
                    return false;
                }

                const snapshot = await db.ref('users').once('value');
                if (!snapshot.exists()) {
                    setMessage("⚙️ Base vide. Création du compte Super Admin...");
                    try {
                        // Créer l'utilisateur dans Auth
                        const userCred = await auth.createUserWithEmailAndPassword('admin@store.com', 'admin123');
                        const uid = userCred.user.uid;
                        // Enregistrer dans RTDB
                        await db.ref('users/' + uid).set({
                            name: 'Administrateur Principal',
                            email: 'admin@store.com',
                            role: 'super_admin',
                            storeId: null,
                            createdAt: new Date().toISOString()
                        });
                        setMessage("✅ Super Admin créé ! Connectez-vous avec admin@store.com / admin123");
                        return true;
                    } catch (err) {
                        if (err.code === 'auth/email-already-exists') {
                            // Le compte existe déjà dans Auth, on récupère l'UID et on met à jour la base
                            const user = await auth.signInWithEmailAndPassword('admin@store.com', 'admin123');
                            const uid = user.user.uid;
                            await db.ref('users/' + uid).set({
                                name: 'Administrateur Principal',
                                email: 'admin@store.com',
                                role: 'super_admin',
                                storeId: null,
                                createdAt: new Date().toISOString()
                            });
                            setMessage("✅ Base mise à jour. Vous pouvez vous connecter.");
                            return true;
                        } else {
                            setMessage("❌ Erreur création: " + err.message, true);
                            return false;
                        }
                    }
                } else {
                    setMessage("✅ Base déjà initialisée. Prêt pour la connexion.");
                    return true;
                }
            } catch (err) {
                console.error(err);
                setMessage("⚠️ Erreur d'accès à la base. Vérifiez les règles de sécurité RTDB (doivent autoriser lecture/écriture).", true);
                return false;
            }
        }

        // ========== 2. Récupération utilisateur depuis RTDB ==========
        async function loadUserFromRTDB(uid) {
            try {
                const snapshot = await db.ref('users/' + uid).once('value');
                if (snapshot.exists()) {
                    return snapshot.val();
                } else {
                    console.warn("Aucune donnée pour uid", uid);
                    return null;
                }
            } catch (err) {
                console.error("Erreur lecture RTDB:", err);
                return null;
            }
        }

        // ========== 3. Connexion ==========
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            setMessage("🔐 Tentative de connexion...");

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                const userData = await loadUserFromRTDB(uid);

                if (!userData) {
                    setMessage("❌ Utilisateur authentifié mais non enregistré dans la base. Contactez l'admin.", true);
                    await auth.signOut();
                    return;
                }

                if (userData.role !== 'super_admin') {
                    setMessage("⛔ Accès refusé : rôle '" + userData.role + "' non autorisé pour le dashboard.", true);
                    await auth.signOut();
                    return;
                }

                // Succès
                document.getElementById('userNameSpan').innerText = userData.name || email;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                setMessage("✅ Connexion réussie !");
            } catch (err) {
                console.error(err);
                setMessage("❌ Échec : " + (err.message || "Email ou mot de passe incorrect"), true);
            }
        };

        // ========== 4. Déconnexion ==========
        logoutBtn.onclick = async () => {
            await auth.signOut();
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            setMessage("Déconnecté.");
        };

        // ========== 5. État d'authentification persistant ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userData = await loadUserFromRTDB(user.uid);
                if (!userData || userData.role !== 'super_admin') {
                    await auth.signOut();
                    authSection.classList.remove('hidden');
                    dashboardSection.classList.add('hidden');
                    setMessage("Session expirée ou rôle invalide. Veuillez vous reconnecter.");
                } else {
                    // Déjà connecté, afficher dashboard directement
                    document.getElementById('userNameSpan').innerText = userData.name || user.email;
                    authSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    setMessage("Bienvenue " + userData.name);
                }
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // Lancer la création du Super Admin au démarrage
        ensureSuperAdminExists();
    </script>
</body>
</html>
