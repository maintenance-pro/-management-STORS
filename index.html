<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management-Stors | ERP Multi-Magasin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <!-- Écran de connexion -->
    <div id="authSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-warehouse text-2xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold">MANAGEMENT‑STORS</h1>
                <p class="text-gray-400 mt-2 text-sm">ERP Multi‑Magasin Pièces Auto</p>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Email</label>
                    <input type="email" id="loginEmail" placeholder="admin@store.com" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Mot de passe</label>
                    <input type="password" id="loginPass" placeholder="••••••••" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-xl focus:ring-2 focus:ring-blue-500">
                </div>
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded-xl transition-all">SE CONNECTER</button>
            </div>
            <div id="loginError" class="mt-4 p-3 bg-red-900/30 border border-red-500 rounded-lg text-red-400 text-xs text-center hidden">
                <i class="fas fa-exclamation-circle"></i> Email ou mot de passe incorrect.
            </div>
            <div id="infoMsg" class="mt-4 text-center text-xs text-gray-400"></div>
        </div>
    </div>

    <!-- Tableau de bord (après connexion) -->
    <div id="dashboardSection" class="hidden min-h-screen bg-gray-100 text-gray-900">
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-warehouse text-blue-600 text-2xl"></i>
                <span class="font-bold text-xl">MANAGEMENT‑STORS</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="userNameDisplay" class="font-bold"></p>
                    <p id="userRoleBadge" class="text-xs text-blue-600 uppercase"></p>
                </div>
                <button id="logoutBtn" class="bg-gray-200 p-2 rounded-full hover:bg-red-100 text-red-600">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>
        <main class="p-6">
            <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow border-l-4 border-blue-600">
                <h2 class="text-3xl font-black">Bienvenue, <span id="welcomeName"></span> !</h2>
                <p class="text-gray-600 mt-2">Accès complet au système de gestion des stocks multi‑magasins.</p>
                <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-xl"><p class="text-xs text-blue-500">STATUT</p><p class="font-bold">✅ Connecté</p></div>
                    <div class="bg-gray-50 p-4 rounded-xl"><p class="text-xs text-gray-500">BASE</p><p class="font-bold">Realtime Database</p></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ---------- CONFIGURATION FIREBASE ----------
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcIHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980",
            measurementId: "G-QZ9W62HWQS",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginError = document.getElementById('loginError');
        const infoMsg = document.getElementById('infoMsg');

        // ---------- CRÉATION AUTOMATIQUE DU SUPER ADMIN SI BASE VIDE ----------
        async function createSuperAdminIfNeeded() {
            try {
                const snapshot = await db.ref('users').once('value');
                const users = snapshot.val();
                if (!users || Object.keys(users).length === 0) {
                    infoMsg.innerText = "⚙️ Initialisation du Super Admin...";
                    // Créer l'utilisateur dans Firebase Auth
                    try {
                        const userCred = await auth.createUserWithEmailAndPassword('admin@store.com', 'admin123');
                        const uid = userCred.user.uid;
                        // Ajouter ses infos dans Realtime Database
                        await db.ref('users/' + uid).set({
                            name: 'Super Administrateur',
                            role: 'super_admin',
                            email: 'admin@store.com',
                            createdAt: new Date().toISOString()
                        });
                        infoMsg.innerText = "✅ Compte Super Admin créé. Connectez-vous avec admin@store.com / admin123";
                        console.log("Super Admin créé");
                    } catch (err) {
                        if (err.code === 'auth/email-already-exists') {
                            // Si le compte Auth existe déjà mais pas dans la base, on le récupère
                            const user = await auth.signInWithEmailAndPassword('admin@store.com', 'admin123');
                            const uid = user.user.uid;
                            await db.ref('users/' + uid).set({
                                name: 'Super Administrateur',
                                role: 'super_admin',
                                email: 'admin@store.com',
                                createdAt: new Date().toISOString()
                            });
                            infoMsg.innerText = "✅ Base mise à jour. Connectez-vous.";
                        } else {
                            console.error(err);
                            infoMsg.innerText = "❌ Erreur création compte: " + err.message;
                        }
                    }
                } else {
                    infoMsg.innerText = "✅ Base déjà initialisée. Connectez-vous.";
                }
            } catch (err) {
                console.error("Erreur lecture base:", err);
                infoMsg.innerText = "⚠️ Impossible de lire la base. Vérifiez les règles de sécurité.";
            }
        }

        // ---------- CONNEXION ----------
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            loginError.classList.add('hidden');
            infoMsg.innerText = "Connexion en cours...";

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;
                // Récupérer les infos dans RTDB
                const snapshot = await db.ref('users/' + uid).once('value');
                const userData = snapshot.val();

                if (userData) {
                    // Afficher le dashboard
                    document.getElementById('userNameDisplay').innerText = userData.name;
                    document.getElementById('welcomeName').innerText = userData.name;
                    document.getElementById('userRoleBadge').innerText = userData.role;
                    authSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    document.body.classList.remove('bg-gray-900');
                    document.body.classList.add('bg-gray-100');
                } else {
                    // L'utilisateur existe dans Auth mais pas dans RTDB → on le crée
                    await db.ref('users/' + uid).set({
                        name: email.split('@')[0],
                        role: 'vendeur', // par défaut, à ajuster
                        email: email,
                        createdAt: new Date().toISOString()
                    });
                    // Recharger la page pour éviter les incohérences
                    window.location.reload();
                }
            } catch (err) {
                console.error(err);
                loginError.classList.remove('hidden');
                infoMsg.innerText = "";
            }
        });

        // ---------- DÉCONNEXION ----------
        document.getElementById('logoutBtn').onclick = async () => {
            await auth.signOut();
            window.location.reload();
        };

        // ---------- SURVEILLANCE ÉTAT AUTH ----------
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // L'utilisateur est connecté, on vérifie son existence dans RTDB
                const snapshot = await db.ref('users/' + user.uid).once('value');
                if (!snapshot.exists()) {
                    // Si absent, on le déconnecte pour forcer la recréation
                    await auth.signOut();
                    window.location.reload();
                }
            }
        });

        // LANCER L'INITIALISATION AU CHARGEMENT
        createSuperAdminIfNeeded();
    </script>
</body>
</html>
