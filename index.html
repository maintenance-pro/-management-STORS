    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcICHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",

        firebase.initializeApp(firebaseConfig);

        let currentUser = null, currentUserRole = null, currentStoreId = null, storesList = [], activeTab = "dashboard";
        let cartItems = [], barcodeBuffer = "", barcodeTimeout = null;
        let storesListener = null, usersListener = null, inventoryListener = null, salesListener = null;
        let productsCache = [];

        const authSection = document.getElementById('authSection');

        function setMessage(msg, isError = false) {
            if (infoMessage) infoMessage.innerText = msg;
            console.log(msg);

        async function getOrCreateUserInRTDB(user) {
            const uid = user.uid, email = user.email;
            const snapshot = await db.ref('users/' + uid).once('value');
            if (snapshot.exists()) return snapshot.val();
            if (AUTHORIZED_ADMINS.includes(email)) {
                const userData = { name: email.split('@')[0], email, role: 'super_admin', storeId: null, createdAt: new Date().toISOString() };
                await db.ref('users/' + uid).set(userData);
                return userData;
            }
            return null;
        }

        // Temps réel magasins
        function startStoresRealtime() {
            if (storesListener) storesListener.off();
            storesListener = db.ref('stores').on('value', (snapshot) => {
                storesList = [];
                snapshot.forEach(child => storesList.push({ id: child.key, ...child.val() }));
                updateStoreSelector();
                if (activeTab === 'stores') renderStoresContent();
                if (activeTab === 'users') renderUsersContent();
            });
        }

        function updateStoreSelector() {
            const container = document.getElementById('storeSelectorContainer');
            if (!container) return;
            if (currentUserRole === 'super_admin' || currentUserRole === 'store-manager') {
                const options = storesList.map(s => `<option value="${s.id}" ${currentStoreId === s.id ? 'selected' : ''}>${s.name}</option>`);
                container.innerHTML = `<select id="storeSelect" class="border rounded p-1 text-sm bg-gray-700"><option value="">Tous</option>${options}</select>`;
                document.getElementById('storeSelect')?.addEventListener('change', (e) => { currentStoreId = e.target.value || null; renderCurrentTab(); });
            } else {
                const store = storesList.find(s => s.id === currentStoreId);
                container.innerHTML = `<span class="text-sm text-gray-400">${store ? store.name : 'Magasin'}</span>`;
            }
        }

        function startInventoryRealtime() {
            if (inventoryListener) inventoryListener.off();
            inventoryListener = db.ref('inventory').on('value', (snapshot) => {
                productsCache = [];
                snapshot.forEach(child => productsCache.push({ id: child.key, ...child.val() }));
                if (['inventory', 'withdraw', 'reorder', 'history', 'pos'].includes(activeTab)) renderCurrentTab();
            });
        }

        async function getProducts(storeId = null) {
            let filtered = productsCache;
            if (storeId) filtered = filtered.filter(p => p.storeId === storeId);
            return filtered;
        }

        async function logAction(action, details = {}) {
            if (!currentUser) return;
            await db.ref('actionLogs').push().set({ action, user: currentUser.email, details, timestamp: new Date().toISOString() });
        }

        async function withdrawStock(productId, currentQty, withdrawQty, reason) {
            if (withdrawQty <= 0 || withdrawQty > currentQty) throw new Error("Quantité invalide");
            const newQty = currentQty - withdrawQty;
            await db.ref('inventory/' + productId).update({ qty: newQty });
            const prod = productsCache.find(p => p.id === productId);
            await db.ref('history').push().set({
                productId, productRef: prod.ref, productName: prod.designation,
                quantity: withdrawQty, oldStock: currentQty, newStock: newQty,
                reason, userId: currentUser.uid, userEmail: currentUser.email,
                storeId: prod.storeId, date: new Date().toISOString()
            });
            return newQty;
        }

        // Impression du reçu
        function printReceipt(saleData) {
            const receiptHtml = `
                <div class="receipt-print" style="font-family: monospace; padding: 1rem; max-width: 300px; margin: 0 auto;">
                    <h2 style="text-align: center;">Management-Stors</h2>
                    <p style="text-align: center;">${new Date().toLocaleString()}</p>
                    <hr>
                    <p><strong>Client :</strong> ${saleData.customerName}</p>
                    <p><strong>Magasin :</strong> ${storesList.find(s => s.id === saleData.storeId)?.name || 'N/A'}</p>
                    <hr>
                    <table style="width:100%; border-collapse: collapse;">
                        <thead><tr><th>Article</th><th>Qté</th><th>Prix</th><th>Total</th></tr></thead>
                        <tbody>
                            ${saleData.items.map(item => `
                                <tr><td>${item.ref}</td><td>${item.qty}</td><td>${item.price} DH</td><td>${item.qty * item.price} DH</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <hr>
                    <p><strong>Total :</strong> ${saleData.total} DH</p>
                    <p><strong>Mode :</strong> ${saleData.paid ? 'Espèces' : 'Crédit'}</p>
                    <hr>
                    <p style="text-align: center;">Merci de votre visite !</p>
                </div>
            `;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(receiptHtml);
            printWindow.document.close();
            printWindow.print();
        }

        // Vente finale (espèces ou crédit) avec impression
        async function finalizeSale(isCredit) {
            if (cartItems.length === 0) return alert("Panier vide");
            const customer = document.getElementById('customerName')?.value.trim() || "Client anonyme";
            // Vérifier stock
            for (let item of cartItems) {
                const prod = productsCache.find(p => p.id === item.id);
                if (!prod || prod.qty < item.qty) { alert(`Stock insuffisant pour ${item.ref}`); return; }
            }
            // Mettre à jour stock
            for (let item of cartItems) {
                const prod = productsCache.find(p => p.id === item.id);
                await db.ref('inventory/' + item.id).update({ qty: prod.qty - item.qty });
                await db.ref('history').push().set({
                    productId: item.id, productRef: item.ref, productName: item.name,
                    quantity: item.qty, oldStock: prod.qty, newStock: prod.qty - item.qty,
                    reason: "vente", userId: currentUser.uid, userEmail: currentUser.email,
                    storeId: prod.storeId, date: new Date().toISOString()
                });
            }
            const total = cartItems.reduce((s,i) => s + i.qty * i.price, 0);
            const saleData = {
                items: cartItems.map(i => ({ ref: i.ref, name: i.name, qty: i.qty, price: i.price })),
                total: total,
                customerName: customer,
                paid: !isCredit,
                date: new Date().toISOString(),
                storeId: currentStoreId,
                sellerId: currentUser.uid,
                sellerEmail: currentUser.email
            };
            const saleRef = db.ref('sales').push();
            await saleRef.set(saleData);
            if (isCredit) {
                await db.ref('debts').push().set({
                    customerName: customer,
                    amount: total,
                    paid: false,
                    saleId: saleRef.key,
                    date: new Date().toISOString()
                });
            }
            logAction(`Vente ${isCredit ? 'crédit' : 'espèce'} de ${cartItems.length} articles`);
            // Impression du reçu
            printReceipt({ ...saleData, storeId: currentStoreId });
            cartItems = [];
            renderCartUI();
            renderCurrentTab();
            alert("Vente enregistrée et reçu imprimé !");
        }

        // Import CSV (inchangé)
        async function importCSVData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/);
                    if (lines.length === 0) return reject("Fichier vide");
                    const headers = lines[0].split(/[;,]/).map(h => h.trim().toLowerCase());
                    const idxRef = headers.findIndex(h => h.includes("n° de pièce") || h.includes("ref") || h.includes("reference"));
                    const idxDesign = headers.findIndex(h => h.includes("nom") || h.includes("designation"));
                    const idxQty = headers.findIndex(h => h.includes("quantité physiq") || h.includes("qty") || h.includes("stock"));
                    const idxPrice = headers.findIndex(h => h.includes("prix moyen") || h.includes("prix achat"));
                    if (idxRef === -1 || idxDesign === -1) return reject("Colonnes obligatoires manquantes");
                    const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                    let imported = 0;
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(/[;,]/);
                        if (cols.length < Math.max(idxRef, idxDesign, idxQty, idxPrice) + 1) continue;
                        const ref = cols[idxRef]?.trim();
                        const designation = cols[idxDesign]?.trim();
                        if (!ref || !designation) continue;
                        const qty = parseInt(cols[idxQty]) || 0;
                        const purchasePrice = parseFloat(cols[idxPrice]) || 0;
                        const salePrice = purchasePrice * 1.20;
                        await db.ref('inventory').push().set({ ref, designation, qty, purchasePrice, salePrice, min_threshold: 5, storeId, createdAt: new Date().toISOString() });
                        imported++;
                    }
                    resolve(imported);
                };
                reader.onerror = reject;
                reader.readAsText(file, "ISO-8859-1");
            });
        }

        async function exportSupplierOrders() {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const data = lowStock.map(p => ({
                "Référence": p.ref, "Désignation": p.designation, "Stock actuel": p.qty,
                "Seuil": p.min_threshold || 5, "Quantité à commander": Math.max((p.min_threshold||5)-p.qty+5,5),
                "Prix achat": p.purchasePrice, "Total": Math.max((p.min_threshold||5)-p.qty+5,5)*p.purchasePrice,
                "Magasin": storesList.find(s=>s.id===p.storeId)?.name || p.storeId
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Commandes");
            XLSX.writeFile(wb, `commandes_${new Date().toISOString().slice(0,19)}.xlsx`);
        }

            const container = document.getElementById('mainContent');

            else if (activeTab === "inventory") await renderInventory(container);

            else if (activeTab === "reorder") await renderReorder(container);

            else if (activeTab === "users") await renderUsers(container);

        // Dashboard

                    <div class="card-industry p-5"><h2 class="text-xl font-bold mb-3 text-[#ffcc00]">🚨 Alertes Stock Faible</h2>

                    <div class="card-industry p-5"><h2 class="text-xl font-bold mb-3">📈 Actions</h2>

                        <button onclick="document.querySelector('[data-tab=\"inventory\"]').click()" class="btn-primary w-full text-left p-2 rounded mb-2">📦 Gérer stock</button>
                        <button onclick="document.querySelector('[data-tab=\"reorder\"]').click()" class="btn-warning w-full text-left p-2 rounded mb-2">📦 Voir réassort</button>

        // POS (Vente) avec scanner
        function initBarcodeListener() {
            document.removeEventListener('keydown', barcodeKeyHandler);
            document.addEventListener('keydown', barcodeKeyHandler);
        }
        function barcodeKeyHandler(e) {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) { e.preventDefault(); addProductByBarcode(barcodeBuffer); barcodeBuffer = ""; if (barcodeTimeout) clearTimeout(barcodeTimeout); }
                return;
            }
            if (e.key.length === 1) { barcodeBuffer += e.key; if (barcodeTimeout) clearTimeout(barcodeTimeout); barcodeTimeout = setTimeout(() => { barcodeBuffer = ""; }, 100); }
        }
        async function addProductByBarcode(barcode) {
            const product = productsCache.find(p => p.ref === barcode && (currentUserRole === 'super_admin' || p.storeId === currentStoreId));
            if (!product) { alert("Produit non trouvé"); return; }
            addToCart(product);
        }
        function addToCart(product, qty = 1) {
            const existing = cartItems.find(i => i.id === product.id);
            if (existing) existing.qty += qty;
            else cartItems.push({ id: product.id, ref: product.ref, name: product.designation, price: product.salePrice, qty });
            renderCartUI();
        }
        function renderCartUI() {
            const cartDiv = document.getElementById('cartContainer');
            if (!cartDiv) return;
            const total = cartItems.reduce((s,i) => s + i.qty * i.price, 0);
            cartDiv.innerHTML = `<h3 class="font-bold text-lg mb-3">🛒 Panier</h3>
                ${cartItems.map((item, idx) => `<div class="flex justify-between items-center border-b py-2"><div><strong>${item.ref}</strong> - ${item.name}<br><span class="text-sm">${item.qty} x ${item.price} DH</span></div><button data-cartidx="${idx}" class="removeCartItem text-red-500"><i class="fas fa-trash-alt"></i></button></div>`).join('')}
                <div class="font-bold text-xl mt-3">Total : ${total} DH</div>
                <div class="mt-4 space-y-2"><input id="customerName" placeholder="Nom du client" class="w-full"><div class="flex gap-2"><button id="sellCashBtn" class="btn-primary flex-1 text-white py-2 rounded-lg">💵 Espèces</button><button id="sellCreditBtn" class="btn-warning flex-1 text-white py-2 rounded-lg">📝 Crédit</button></div></div>`;
            document.querySelectorAll('.removeCartItem').forEach(btn => btn.onclick = () => { cartItems.splice(parseInt(btn.dataset.cartidx),1); renderCartUI(); });
            document.getElementById('sellCashBtn')?.addEventListener('click', () => finalizeSale(false));
            document.getElementById('sellCreditBtn')?.addEventListener('click', () => finalizeSale(true));
        }

        async function renderPOS(container) {
            container.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card-industry p-5"><h2 class="text-lg font-semibold mb-3">🔍 Recherche / Scanner</h2><input type="text" id="searchProduct" placeholder="Nom ou référence..." class="w-full mb-3"><div id="searchResults" class="max-h-96 overflow-y-auto"></div></div><div id="cartContainer" class="card-industry p-5"></div></div>`;
            initBarcodeListener();
            renderCartUI();
            document.getElementById('searchProduct').addEventListener('input', async (e) => {
                const kw = e.target.value.toLowerCase();
                if (kw.length < 2) return;
                const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
                const results = products.filter(p => p.designation.toLowerCase().includes(kw) || p.ref.toLowerCase().includes(kw));
                document.getElementById('searchResults').innerHTML = results.slice(0,15).map(p => `<div class="border rounded-lg p-3 mb-2 flex justify-between"><div><strong>${p.ref}</strong> - ${p.designation}<br><span class="text-sm">Stock: ${p.qty} - ${p.salePrice} DH</span></div><button data-id="${p.id}" data-ref="${p.ref}" data-name="${p.designation}" data-price="${p.salePrice}" class="addToCartBtn btn-primary text-white px-3 py-1 rounded">Ajouter</button></div>`).join('');
                document.querySelectorAll('.addToCartBtn').forEach(btn => btn.onclick = () => addToCart({ id: btn.dataset.id, ref: btn.dataset.ref, designation: btn.dataset.name, salePrice: parseFloat(btn.dataset.price) }));
            });
        }

        async function renderInventory(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `
                <div class="card-industry p-5">
                    <div class="flex justify-between flex-wrap gap-2"><h2 class="text-2xl font-bold">Gestion Stock</h2><div class="flex gap-2"><input type="file" id="csvUpload" accept=".csv" class="bg-gray-700"><button id="importCsvBtn" class="btn-primary text-white px-3 py-1 rounded">Importer CSV</button></div></div>
                    <button id="addProductBtn" class="btn-primary text-white px-3 py-1 rounded mt-2 mb-3">➕ Nouvelle Pièce</button>
                    <div class="overflow-x-auto"><table class="min-w-full border border-gray-700 mt-3"><thead><tr class="bg-gray-800"><th>Ref</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Prix Vente</th><th>Actions</th></tr></thead><tbody id="invTableBody"></tbody></table></div>
                </div>
            `;
            const tbody = document.getElementById('invTableBody');
            tbody.innerHTML = products.map(p => `<tr><td class="p-2">${p.ref}</td><td>${p.designation}</td><td><input type="number" data-id="${p.id}" class="stockInput w-20 bg-gray-700" value="${p.qty}"></td><td><input type="number" data-id="${p.id}" class="threshInput w-20 bg-gray-700" value="${p.min_threshold||5}"></td><td>${p.purchasePrice} DH</td><td>${p.salePrice} DH</td><td><button class="updateStockBtn text-blue-400" data-id="${p.id}">💾</button> <button class="deleteProductBtn text-red-400" data-id="${p.id}">🗑️</button></td></tr>`).join('');
            document.getElementById('addProductBtn').onclick = async () => {
                const ref = prompt("Référence"); const des = prompt("Désignation"); const qty = parseInt(prompt("Qté initiale"))||0; const price = parseFloat(prompt("Prix achat"));
                if(ref && des && price) await db.ref('inventory').push().set({ ref, designation: des, qty, purchasePrice: price, salePrice: price*1.2, min_threshold: 5, storeId: currentStoreId || storesList[0]?.id, createdAt: new Date().toISOString() });
            };
            document.getElementById('importCsvBtn').onclick = () => {
                const file = document.getElementById('csvUpload').files[0];
                if (!file) return alert("Sélectionnez un CSV");
                importCSVData(file).then(count => { alert(`${count} produits importés`); renderCurrentTab(); }).catch(err => alert("Erreur: "+err));
            };
            document.querySelectorAll('.updateStockBtn').forEach(btn => btn.onclick = async () => { const id = btn.dataset.id; await db.ref('inventory/'+id).update({ qty: parseInt(document.querySelector(`.stockInput[data-id="${id}"]`).value), min_threshold: parseInt(document.querySelector(`.threshInput[data-id="${id}"]`).value) }); });
            document.querySelectorAll('.deleteProductBtn').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ?")) await db.ref('inventory/'+btn.dataset.id).remove(); });
        }

        // Withdraw
        async function renderWithdraw(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `<div class="card-industry p-5"><h2 class="text-2xl font-bold mb-4">📤 Sortie de stock</h2><select id="withdrawProduct" class="w-full mb-3">${products.map(p => `<option value="${p.id}" data-stock="${p.qty}" data-name="${p.designation}">${p.ref} - ${p.designation} (stock: ${p.qty})</option>`).join('')}</select><input type="number" id="withdrawQty" placeholder="Quantité" class="w-full mb-3"><select id="withdrawReason" class="w-full mb-3"><option>vente</option><option>casse</option><option>transfert</option></select><button id="doWithdraw" class="btn-primary px-4 py-2 rounded">Effectuer retrait</button><div id="withdrawMsg" class="mt-3"></div></div>`;
            document.getElementById('doWithdraw').onclick = async () => {
                const id = document.getElementById('withdrawProduct').value;
                const qty = parseInt(document.getElementById('withdrawQty').value);
                const reason = document.getElementById('withdrawReason').value;
                const selected = document.getElementById('withdrawProduct').options[document.getElementById('withdrawProduct').selectedIndex];
                const currentStock = parseInt(selected.dataset.stock);
                if (isNaN(qty) || qty <= 0) return document.getElementById('withdrawMsg').innerText = "Quantité invalide";
                if (qty > currentStock) return document.getElementById('withdrawMsg').innerText = "Stock insuffisant";
                await withdrawStock(id, currentStock, qty, reason);
                document.getElementById('withdrawMsg').innerText = `✅ Retrait effectué. Nouveau stock : ${currentStock - qty}`;
                setTimeout(() => renderCurrentTab(), 1000);
            };
        }

        // History (historique des mouvements de stock)
        async function renderHistory(container) {
            const snapshot = await db.ref('history').orderByChild('date').limitToLast(100).once('value');
            const history = []; snapshot.forEach(c => history.push(c.val()));
            history.reverse();
            container.innerHTML = `<div class="card-industry p-5"><h2 class="text-2xl font-bold mb-4">📜 Historique des mouvements</h2><div class="overflow-x-auto"><table class="min-w-full border border-gray-700"><thead><tr><th>Date</th><th>Réf</th><th>Produit</th><th>Qté</th><th>Avant</th><th>Après</th><th>Motif</th><th>Utilisateur</th></tr></thead><tbody>${history.map(h => `<tr><td>${new Date(h.date).toLocaleString()}</td><td>${h.productRef||''}</td><td>${h.productName||''}</td><td class="text-[#ffcc00]">${h.quantity}</td><td>${h.oldStock}</td><td>${h.newStock}</td><td>${h.reason}</td><td>${h.userEmail||''}</td></tr>`).join('')}</tbody></table></div></div>`;
        }

        // Historique des ventes (nouvel onglet)
        async function renderSalesHistory(container) {
            const snapshot = await db.ref('sales').orderByChild('date').limitToLast(200).once('value');
            const sales = []; snapshot.forEach(c => sales.push({ id: c.key, ...c.val() }));
            sales.reverse();
            const filtered = (currentUserRole !== 'super_admin') ? sales.filter(s => s.storeId === currentStoreId) : sales;
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">📋 Historique des ventes</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border border-gray-700">
                            <thead class="bg-gray-800"><tr><th>Date</th><th>Client</th><th>Magasin</th><th>Total</th><th>Mode</th><th>Vendeur</th><th>Détails</th></tr></thead>
                            <tbody>
                                ${filtered.map(s => `
                                    <tr class="border-b border-gray-700">
                                        <td class="p-2">${new Date(s.date).toLocaleString()}</td>
                                        <td>${s.customerName}</td>
                                        <td>${storesList.find(st => st.id === s.storeId)?.name || s.storeId}</td>
                                        <td class="text-green-400">${s.total} DH</td>
                                        <td>${s.paid ? 'Espèces' : 'Crédit'}</td>
                                        <td>${s.sellerEmail || s.sellerId}</td>
                                        <td><button data-id="${s.id}" class="viewSaleDetails bg-blue-700 px-2 py-1 rounded text-xs">Voir articles</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            // Gestionnaire pour voir les détails
            document.querySelectorAll('.viewSaleDetails').forEach(btn => {
                btn.onclick = async () => {
                    const saleId = btn.dataset.id;
                    const saleSnap = await db.ref('sales/' + saleId).once('value');
                    const sale = saleSnap.val();
                    let details = "Articles:\n";
                    sale.items.forEach(item => details += `${item.ref} - ${item.name} : ${item.qty} x ${item.price} = ${item.qty * item.price} DH\n`);
                    alert(details);
                };
            });
        }

        // Reorder (inchangé)
        async function renderReorder(container) {
            const products = await getProducts(null);
            const low = products.filter(p => p.qty <= (p.min_threshold||5));
            const filtered = (currentUserRole !== 'super_admin') ? low.filter(p => p.storeId === currentStoreId) : low;
            container.innerHTML = `<div class="card-industry p-5"><h2 class="text-2xl font-bold mb-4">🔄 Réassort</h2><div class="overflow-x-auto"><table class="min-w-full border border-gray-700"><thead><tr><th>Magasin</th><th>Réf</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Qté recommandée</th></tr></thead><tbody>${filtered.map(p => `<tr><td>${storesList.find(s=>s.id===p.storeId)?.name||p.storeId}</td><td>${p.ref}</td><td>${p.designation}</td><td class="text-[#ffcc00]">${p.qty}</td><td>${p.min_threshold||5}</td><td>${p.purchasePrice} DH</td><td>${Math.max((p.min_threshold||5)-p.qty+5,5)}</td></tr>`).join('')}</tbody></table></div><button id="exportCsv" class="btn-primary mt-4 px-4 py-2 rounded">📎 Exporter CSV</button>${currentUserRole === 'super_admin' ? '<button id="exportExcel" class="bg-green-700 mt-4 ml-2 px-4 py-2 rounded">📊 Exporter Excel</button>' : ''}</div>`;
            document.getElementById('exportCsv')?.addEventListener('click', () => { let csv = "Réf,Designation,Qté recommandée\n"+filtered.map(p=>`${p.ref},${p.designation},${Math.max((p.min_threshold||5)-p.qty+5,5)}`).join("\n"); const blob = new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="commandes.csv"; a.click(); });
            if (currentUserRole === 'super_admin') document.getElementById('exportExcel')?.addEventListener('click', exportSupplierOrders);
        }

        // Transfers, Expenses, Credits (inchangés)
        async function renderTransfers(container) {
            const transfers = []; (await db.ref('transfers').once('value')).forEach(c=>transfers.push(c.val()));
            container.innerHTML = `<div class="card-industry p-5"><h2>🚚 Transfert</h2><div class="flex flex-wrap gap-2"><select id="fromStore">${storesList.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><select id="toStore">${storesList.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><input id="transferRef" placeholder="Réf produit"><input id="transferQty" type="number" placeholder="Qté"><button id="createTransfer" class="btn-primary px-3 py-1 rounded">Créer</button></div><div class="mt-4">${transfers.map(t=>`<div>${t.fromStore} → ${t.toStore} : ${t.ref} (${t.qty})</div>`).join('')}</div></div>`;
            document.getElementById('createTransfer').onclick = async () => { await db.ref('transfers').push().set({ fromStore: document.getElementById('fromStore').value, toStore: document.getElementById('toStore').value, ref: document.getElementById('transferRef').value, qty: parseInt(document.getElementById('transferQty').value), status: "en attente", createdAt: new Date().toISOString() }); renderCurrentTab(); };
        }
        async function renderExpenses(container) {
            const expenses = []; (await db.ref('expenses').once('value')).forEach(c=>expenses.push(c.val()));
            container.innerHTML = `<div class="card-industry p-5"><h2>💰 Dépenses</h2><div class="flex flex-wrap gap-2"><input id="supplier" placeholder="Fournisseur"><input id="amountExp" type="number" placeholder="Montant"><input id="descExp" placeholder="Motif"><button id="addExpense" class="btn-primary px-3 py-1 rounded">Ajouter</button></div><div class="mt-4">${expenses.map(e=>`<div>${e.supplier} - ${e.amount} DH : ${e.desc}</div>`).join('')}</div></div>`;
            document.getElementById('addExpense').onclick = async () => { await db.ref('expenses').push().set({ supplier: document.getElementById('supplier').value, amount: parseFloat(document.getElementById('amountExp').value), desc: document.getElementById('descExp').value, date: new Date().toISOString() }); renderCurrentTab(); };
        }
        async function renderCredits(container) {
            const snapshot = await db.ref('debts').orderByChild('paid').equalTo(false).once('value');
            const debts = []; snapshot.forEach(c=>debts.push({id:c.key,...c.val()}));
            container.innerHTML = `<div class="card-industry p-5"><h2>💳 Crédits Clients</h2><table class="min-w-full border"><thead><tr><th>Client</th><th>Montant</th><th>Date</th><th>Action</th></tr></thead><tbody>${debts.map(d=>`<tr><td>${d.customerName}</td><td>${d.amount} DH</td><td>${new Date(d.date).toLocaleDateString()}</td><td><button data-id="${d.id}" class="payDebtBtn bg-green-700 px-2 py-1 rounded">Marquer payé</button></td></tr>`).join('')}</tbody></table></div>`;
            document.querySelectorAll('.payDebtBtn').forEach(btn => btn.onclick = async () => { await db.ref('debts/'+btn.dataset.id).update({ paid: true }); renderCurrentTab(); });
        }

        // ========== MAGASINS (avec limites) ==========
        async function renderStores(container) {
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">🏪 Gestion des magasins</h2>
                    ${currentUserRole === 'super_admin' ? `
                        <div class="flex flex-wrap gap-2 mb-6">
                            <input id="newStoreName" placeholder="Nom du magasin" class="flex-1">
                            <input id="newStoreLocation" placeholder="Adresse" class="flex-1">
                            <button id="addStoreBtn" class="btn-primary text-white px-4 py-2 rounded-lg">➕ Ajouter</button>
                        </div>
                    ` : '<p class="text-red-400 mb-4">⚠️ Seul un Super Admin peut ajouter des magasins.</p>'}
                    <div id="storesListContainer"></div>
                </div>
            `;
            await renderStoresContent();
            if (currentUserRole === 'super_admin') {
                document.getElementById('addStoreBtn').onclick = async () => {
                    if (storesList.length >= 10) {
                        alert("Limite atteinte : maximum 10 magasins.");
                        return;
                    }
                    const name = document.getElementById('newStoreName').value.trim();
                    if (!name) return alert("Nom requis");
                    const location = document.getElementById('newStoreLocation').value.trim();
                    await db.ref('stores').push().set({ name, location, createdAt: new Date().toISOString() });
                    document.getElementById('newStoreName').value = '';
                    document.getElementById('newStoreLocation').value = '';
                    await logAction(`Ajout magasin ${name}`);
                };
            }
        }

        async function renderStoresContent() {
            const container = document.getElementById('storesListContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="overflow-x-auto"><table class="min-w-full border border-gray-700"><thead><tr><th>Nom</th><th>Adresse</th><th>Actions</th></tr></thead><tbody id="storesTableBody"></tbody></table></div>
            `;
            const tbody = document.getElementById('storesTableBody');
            tbody.innerHTML = storesList.map(s => `
                <tr><td>${s.name}</td><td>${s.location || ''}</td><td>${currentUserRole === 'super_admin' ? `<button data-id="${s.id}" class="deleteStoreBtn bg-red-700 text-white px-3 py-1 rounded text-sm">Supprimer</button>` : '—'}</td></tr>
            `).join('');
            document.querySelectorAll('.deleteStoreBtn').forEach(btn => {
                btn.onclick = async () => { if(confirm("Supprimer ce magasin ?")) { await db.ref('stores/'+btn.dataset.id).remove(); await logAction(`Magasin supprimé`); } };
            });
        }

        // ========== UTILISATEURS (avec limites et rafraîchissement) ==========
        async function renderUsers(container) {
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">👥 Gestion des utilisateurs</h2>
                    ${(currentUserRole === 'super_admin' || currentUserRole === 'store-manager') ? `
                        <div class="flex flex-wrap gap-2 mb-6">
                            <input id="newUserEmail" placeholder="Email" class="flex-1">
                            <select id="newUserRole"><option value="manager">Manager</option><option value="vendeur">Vendeur</option>${currentUserRole === 'super_admin' ? '<option value="super_admin">Super Admin</option>' : ''}</select>
                            <select id="newUserStore">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                            <button id="createUserBtn" class="btn-primary text-white px-4 py-2 rounded-lg">Créer</button>
                        </div>
                    ` : '<p class="text-red-400 mb-4">⚠️ Seuls Super Admin ou Manager peuvent ajouter des utilisateurs.</p>'}
                    <div id="usersListContainer"></div>
                </div>
            `;
            await renderUsersContent();
            if (currentUserRole === 'super_admin' || currentUserRole === 'store-manager') {
                document.getElementById('createUserBtn').onclick = async () => {
                    // Vérifier limite totale d'utilisateurs
                    const userCount = await (await db.ref('users').once('value')).numChildren();
                    if (userCount >= 30) {
                        alert("Limite atteinte : maximum 30 utilisateurs.");
                        return;
                    }
                    const email = document.getElementById('newUserEmail').value.trim();
                    const role = document.getElementById('newUserRole').value;
                    const storeId = document.getElementById('newUserStore').value;
                    const pwd = "password123";
                    if (!email) return alert("Email requis");
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                        await db.ref('users/'+cred.user.uid).set({ name: email.split('@')[0], email, role, storeId, createdAt: new Date().toISOString() });
                        alert(`Utilisateur créé. Mot de passe: ${pwd}`);
                        await renderUsersContent(); // rafraîchir la liste
                    } catch(e) { alert("Erreur: "+e.message); }
                };
            }
        }

        async function renderUsersContent() {
            const snapshot = await db.ref('users').once('value');
            const users = []; snapshot.forEach(c => users.push({ id: c.key, ...c.val() }));
            const container = document.getElementById('usersListContainer');
            if (!container) return;
            container.innerHTML = `<div class="overflow-x-auto"><table class="min-w-full border border-gray-700"><thead><tr><th>Email</th><th>Rôle</th><th>Magasin</th><th>Actions</th></tr></thead><tbody>${users.map(u => `
                <td><td>${u.email}</td><td><span class="badge ${u.role === 'super_admin' ? 'bg-blue-900' : (u.role === 'manager' ? 'bg-green-900' : 'bg-yellow-900')} px-2 py-1 rounded">${u.role}</span></td><td>${storesList.find(s=>s.id===u.storeId)?.name || '-'}</td><td>${(currentUserRole === 'super_admin' || (currentUserRole === 'store-manager' && u.role !== 'super_admin')) && u.email !== currentUser?.email ? `<button data-id="${u.id}" class="deleteUserBtn bg-red-700 text-white px-3 py-1 rounded text-sm">Supprimer</button>` : '—'}</td>
            `).join('')}</tbody></table></div>`;
            document.querySelectorAll('.deleteUserBtn').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer cet utilisateur ?")) { await db.ref('users/'+btn.dataset.id).remove(); await renderUsersContent(); } });
        }

        async function renderLogs(container) {
            const snapshot = await db.ref('actionLogs').orderByChild('timestamp').limitToLast(50).once('value');
            const logs = []; snapshot.forEach(c => logs.push(c.val()));
            container.innerHTML = `<div class="card-industry p-5"><h2>📜 Journaux</h2><ul class="list-disc pl-5">${logs.reverse().map(l => `<li>${l.action} - ${l.user} - ${new Date(l.timestamp).toLocaleString()}</li>`).join('')}</ul></div>`;
        }

        // Authentification
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!pwd) return setMessage("Mot de passe requis", true);
            try {
                const cred = await auth.signInWithEmailAndPassword(email, pwd);
                const userData = await getOrCreateUserInRTDB(cred.user);
                if (!userData || userData.role !== 'super_admin') throw new Error("Accès refusé");
                currentUser = { uid: cred.user.uid, email, role: userData.role, storeId: userData.storeId };
                currentUserRole = userData.role;
                currentStoreId = userData.storeId;
                document.getElementById('roleBadge').innerText = currentUserRole;
                startStoresRealtime();
                startInventoryRealtime();
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                renderDashboard();
                setMessage("Connecté");
            } catch (err) { setMessage("Erreur: " + err.message, true); }
        };
        logoutBtn.onclick = async () => { await auth.signOut(); location.reload(); };
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const ud = await getOrCreateUserInRTDB(user);
                if (!ud || ud.role !== 'super_admin') { await auth.signOut(); authSection.classList.remove('hidden'); dashboardSection.classList.add('hidden'); }
            } else { authSection.classList.remove('hidden'); dashboardSection.classList.add('hidden'); }
        });
    </script>
</body>
</html>
