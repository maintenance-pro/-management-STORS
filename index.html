        // ========== GESTION UTILISATEUR & RÔLES ==========
        async function getOrCreateUserInRTDB(user) {
            const uid = user.uid;
            const email = user.email;
            const snapshot = await db.ref('users/' + uid).once('value');
            if (snapshot.exists()) return snapshot.val();
            if (AUTHORIZED_ADMINS.includes(email)) {
                const userData = {
                    name: email.split('@')[0],
                    email: email,
                    role: 'super_admin',
                    storeId: null,
                    createdAt: new Date().toISOString()
                };
                await db.ref('users/' + uid).set(userData);
                return userData;
            }
            return null;
        }

        async function loadStores() {
            const snapshot = await db.ref('stores').once('value');
            const stores = [];
            snapshot.forEach(child => stores.push({ id: child.key, ...child.val() }));
            if (stores.length === 0 && currentUserRole === 'super_admin') {
                await db.ref('stores').push().set({ name: "Magasin Central", location: "Casablanca", createdAt: new Date().toISOString() });
                await db.ref('stores').push().set({ name: "Magasin Sud", location: "Marrakech", createdAt: new Date().toISOString() });
                return loadStores();
            }
            storesList = stores;
            return storesList;
        }

        async function logAction(action) {
            if (!currentUser) return;
            await db.ref('actionLogs').push().set({
                action: action,
                user: currentUser.email,
                timestamp: new Date().toISOString()
            });
        }

        // ========== FONCTIONS PRODUITS ==========
        async function getProducts(storeId = null) {
            const snapshot = await db.ref('inventory').once('value');
            const products = [];
            snapshot.forEach(child => {
                const prod = { id: child.key, ...child.val() };
                if (storeId && prod.storeId !== storeId) return;
                products.push(prod);
            });
            return products;
        }

        // ========== IMPORT CSV (avec mapping personnalisé) ==========
        async function importCSVData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/);
                    if (lines.length === 0) return reject("Fichier vide");
                    const headers = lines[0].split(/[;,]/).map(h => h.trim().toLowerCase());
                    // Mapping attendu: "N° de Pièce" -> ref, "Nom" -> designation, "Quantité Physiq." -> qty, "Prix Moyen" -> purchasePrice
                    const idxRef = headers.findIndex(h => h.includes("n° de pièce") || h.includes("ref") || h.includes("reference"));
                    const idxDesign = headers.findIndex(h => h.includes("nom") || h.includes("designation") || h.includes("désignation"));
                    const idxQty = headers.findIndex(h => h.includes("quantité physiq") || h.includes("qty") || h.includes("stock"));
                    const idxPrice = headers.findIndex(h => h.includes("prix moyen") || h.includes("prix achat") || h.includes("purchase"));
                    if (idxRef === -1 || idxDesign === -1) return reject("Colonnes obligatoires manquantes: Référence et Désignation");
                    const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                    let imported = 0;
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(/[;,]/);
                        if (cols.length < Math.max(idxRef, idxDesign, idxQty, idxPrice) + 1) continue;
                        const ref = cols[idxRef]?.trim();
                        const designation = cols[idxDesign]?.trim();
                        if (!ref || !designation) continue;
                        const qty = parseInt(cols[idxQty]) || 0;
                        const purchasePrice = parseFloat(cols[idxPrice]) || 0;
                        const salePrice = purchasePrice * 1.20;
                        const min_threshold = 5; // seuil par défaut
                        await db.ref('inventory').push().set({
                            ref, designation, qty, purchasePrice, salePrice, min_threshold,
                            storeId: storeId,
                            createdAt: new Date().toISOString()
                        });
                        imported++;
                    }
                    resolve(imported);
                };
                reader.onerror = reject;
                reader.readAsText(file, "ISO-8859-1");
            });
        }

        // ========== EXPORT COMMANDES FOURNISSEURS (Excel) ==========
        async function exportSupplierOrders() {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const data = lowStock.map(p => ({
                "Référence": p.ref,
                "Désignation": p.designation,
                "Stock actuel": p.qty,
                "Seuil alerte": p.min_threshold || 5,
                "Quantité à commander": Math.max((p.min_threshold || 5) - p.qty + 5, 5),
                "Prix achat (DH)": p.purchasePrice,
                "Total (DH)": Math.max((p.min_threshold || 5) - p.qty + 5, 5) * p.purchasePrice,
                "Magasin": storesList.find(s => s.id === p.storeId)?.name || p.storeId
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Commandes_Fournisseurs");
            XLSX.writeFile(wb, `commandes_fournisseurs_${new Date().toISOString().slice(0,19)}.xlsx`);
        }

            else if (activeTab === "users") await renderUsers(container);
            else if (activeTab === "logs") await renderLogs(container);

                        <div class="flex gap-2">

                    <td class="border p-1"><input type="number" data-thresh="${p.id}" class="thresholdInput w-20 border" value="${p.min_threshold || 5}"></td>
                    <td class="border p-1">${p.purchasePrice} DH</td><td class="border p-1">${p.salePrice} DH</td>
                    <td class="border p-1"><button class="updateStockBtn text-blue-600" data-id="${p.id}">💾</button> <button class="deleteProductBtn text-red-600" data-id="${p.id}">🗑️</button></td>

                const file = document.getElementById('csvUpload').files[0];

                    alert(`${count} produits importés`);
                    renderCurrentTab();
                }).catch(err => alert("Erreur import: " + err));

            document.querySelectorAll('.updateStockBtn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.dataset.id;
                    const newQty = parseInt(document.querySelector(`.stockInput[data-id="${id}"]`).value);
                    const newThresh = parseInt(document.querySelector(`.thresholdInput[data-thresh="${id}"]`).value);
                    await db.ref('inventory/' + id).update({ qty: newQty, min_threshold: newThresh });
                    logAction(`Mise à jour stock ${id}`);
                    renderCurrentTab();
                };
            });
            document.querySelectorAll('.deleteProductBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer définitivement ?")) {
                        await db.ref('inventory/' + btn.dataset.id).remove();
                        logAction(`Produit supprimé ${btn.dataset.id}`);
                        renderCurrentTab();
                    }
                };
            });
        }

        async function addProductModal() {
            const ref = prompt("Référence (code barre)");
            const des = prompt("Désignation");
            const qty = parseInt(prompt("Quantité initiale")) || 0;
            const purchase = parseFloat(prompt("Prix Achat"));
            const seuil = parseInt(prompt("Seuil d'alerte (ex: 3)")) || 5;
            if (ref && des && purchase) {
                const salePrice = purchase * 1.20;
                const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                await db.ref('inventory').push().set({
                    ref, designation: des, qty, purchasePrice: purchase, salePrice, min_threshold: seuil,
                    storeId: storeId, createdAt: new Date().toISOString()
                });
                logAction(`Ajout produit ${ref}`);
                renderCurrentTab();
            }
        }

        // ========== SCANNER & VENTES (simplifié mais fonctionnel) ==========
        function initBarcodeListener() {
            document.removeEventListener('keydown', barcodeKeyHandler);
            document.addEventListener('keydown', barcodeKeyHandler);
        }
        function barcodeKeyHandler(e) {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) {
                    e.preventDefault();
                    addProductToCartByBarcode(barcodeBuffer);
                    barcodeBuffer = "";
                    if (barcodeTimeout) clearTimeout(barcodeTimeout);
                }
                return;
            }
            if (e.key.length === 1) {
                barcodeBuffer += e.key;
                if (barcodeTimeout) clearTimeout(barcodeTimeout);
                barcodeTimeout = setTimeout(() => { barcodeBuffer = ""; }, 100);
            }
        }

        async function addProductToCartByBarcode(barcode) {
            const snapshot = await db.ref('inventory').orderByChild('ref').equalTo(barcode).once('value');
            let product = null;
            snapshot.forEach(child => {
                const p = { id: child.key, ...child.val() };
                if (currentUserRole !== 'super_admin' && p.storeId !== currentStoreId) return;
                product = p;
            });
            if (!product) { alert("Produit non trouvé"); return; }
            const existing = cartItems.find(i => i.id === product.id);
            if (existing) existing.qty++;
            else cartItems.push({ id: product.id, ref: product.ref, designation: product.designation, salePrice: product.salePrice, qty: 1 });
            renderCartUI();
        }

        function renderCartUI() {
            const cartDiv = document.getElementById('cartContainer');
            if (!cartDiv) return;
            const total = cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0);
            cartDiv.innerHTML = `
                <h3 class="font-bold text-lg">🛒 Panier</h3>
                ${cartItems.map((item, idx) => `
                    <div class="flex justify-between border-b py-2">
                        <span>${item.ref} - ${item.designation}</span>
                        <span>${item.qty} x ${item.salePrice} DH</span>
                        <button data-cartidx="${idx}" class="removeCartItem text-red-500">❌</button>
                    </div>
                `).join('')}
                <div class="font-bold mt-2">Total: ${total} DH</div>
                <div class="mt-3 flex gap-2">
                    <input id="customerName" placeholder="Nom client (crédit)" class="border p-1 flex-1">
                    <button id="sellCashBtn" class="bg-green-600 text-white px-3 py-1 rounded">Espèce</button>
                    <button id="sellCreditBtn" class="bg-orange-600 text-white px-3 py-1 rounded">Crédit</button>
                </div>
            `;
            document.querySelectorAll('.removeCartItem').forEach(btn => {
                btn.onclick = () => {
                    cartItems.splice(parseInt(btn.dataset.cartidx), 1);
                    renderCartUI();
                };
            });
            document.getElementById('sellCashBtn')?.addEventListener('click', () => finalizeSale(false));
            document.getElementById('sellCreditBtn')?.addEventListener('click', () => finalizeSale(true));
        }

        async function finalizeSale(isCredit) {
            if (cartItems.length === 0) return;
            const customer = document.getElementById('customerName')?.value || "Client inconnu";
            for (let item of cartItems) {
                const prodRef = db.ref('inventory/' + item.id);
                const snapshot = await prodRef.once('value');
                const currentStock = snapshot.val().qty;
                if (currentStock < item.qty) {
                    alert(`Stock insuffisant pour ${item.ref}`);
                    return;
                }
                await prodRef.update({ qty: currentStock - item.qty });
            }
            const saleRef = db.ref('sales').push();
            await saleRef.set({
                items: cartItems,
                total: cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0),
                customerName: customer,
                paid: !isCredit,
                date: new Date().toISOString(),
                storeId: currentStoreId,
                sellerId: currentUser.uid
            });
            if (isCredit) {
                await db.ref('debts').push().set({
                    customerName: customer,
                    amount: cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0),
                    paid: false,
                    saleId: saleRef.key,
                    date: new Date().toISOString()
                });
            }
            logAction(`Vente ${isCredit ? 'crédit' : 'espèce'} de ${cartItems.length} articles`);
            cartItems = [];
            renderCartUI();
            renderCurrentTab();
        }

                    <div class="bg-white p-5 rounded-xl shadow">
                        <h2 class="text-xl font-bold">🔍 Scanner / Recherche IA</h2>
                        <input type="text" id="aiSearchInput" placeholder="Chercher 'pompe eau'..." class="w-full p-3 border rounded mt-2">
                        <div id="searchResults" class="mt-3"></div>
                    </div>
                    <div id="cartContainer" class="bg-white p-5 rounded-xl shadow"></div>
                </div>
            `;
            initBarcodeListener();
            renderCartUI();
            const searchInput = document.getElementById('aiSearchInput');
            searchInput.addEventListener('input', async (e) => {
                const keyword = e.target.value.toLowerCase();
                if (keyword.length < 2) return;
                const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
                const results = products.filter(p => p.designation.toLowerCase().includes(keyword) || p.ref.toLowerCase().includes(keyword));
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = results.slice(0, 10).map(p => `
                    <div class="border p-2 mb-1 flex justify-between items-center">
                        <span>${p.ref} - ${p.designation} (${p.qty} dispo)</span>
                        <button data-ref="${p.ref}" class="addBySearchBtn bg-indigo-500 text-white px-2 rounded">➕ Ajouter</button>
                    </div>
                `).join('');
                document.querySelectorAll('.addBySearchBtn').forEach(btn => {
                    btn.onclick = () => addProductToCartByBarcode(btn.dataset.ref);
                });
            });
        }

        // ========== RÉASSORT ==========
        async function renderReorder(container) {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const filtered = (currentUserRole !== 'super_admin') ? lowStock.filter(p => p.storeId === currentStoreId) : lowStock;
            container.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-2xl font-bold mb-4">📋 Articles à Commander (Stock ≤ Seuil)</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border">
                            <thead class="bg-gray-100"><tr><th>Magasin</th><th>Référence</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Qté à commander</th></tr></thead>
                            <tbody>${filtered.map(p => `
                                <tr>
                                    <td class="border p-1">${storesList.find(s => s.id === p.storeId)?.name || p.storeId}</td>
                                    <td class="border p-1">${p.ref}</td><td class="border p-1">${p.designation}</td>
                                    <td class="border p-1 text-red-600 font-bold">${p.qty}</td>
                                    <td class="border p-1">${p.min_threshold || 5}</td>
                                    <td class="border p-1">${p.purchasePrice} DH</td>
                                    <td class="border p-1">${Math.max((p.min_threshold||5) - p.qty + 5, 5)}</td>
                                </tr>
                            `).join('')}</tbody>
                        </table>
                    </div>
                    <button id="exportReorderBtn" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">📎 Exporter CSV Commande Fournisseur</button>
                    ${currentUserRole === 'super_admin' ? '<button id="exportExcelBtn" class="mt-4 ml-2 bg-green-600 text-white px-4 py-2 rounded">📊 Exporter Excel (Commandes)</button>' : ''}
                </div>
            `;
            document.getElementById('exportReorderBtn')?.addEventListener('click', () => {
                let csv = "Référence,Désignation,Quantité à commander,Prix achat\n" + filtered.map(p => `${p.ref},${p.designation},${Math.max(p.min_threshold - p.qty + 5, 5)},${p.purchasePrice}`).join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "commandes_fournisseur.csv";
                link.click();
            });
            if (currentUserRole === 'super_admin') {
                document.getElementById('exportExcelBtn')?.addEventListener('click', exportSupplierOrders);
            }
        }

        // ========== TRANSFERTS ==========
        async function renderTransfers(container) {
            const transfersSnapshot = await db.ref('transfers').once('value');
            const transfers = [];
            transfersSnapshot.forEach(child => transfers.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>🚚 Transfert Inter-Magasin</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <select id="fromStore" class="border p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <select id="toStore" class="border p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <input id="transferRef" placeholder="Référence produit" class="border p-2">
                        <input id="transferQty" type="number" placeholder="Quantité" class="border p-2">
                        <button id="createTransferBtn" class="bg-blue-600 text-white p-2 rounded">Créer Transfert</button>
                    </div>
                    <div id="transfersList" class="mt-4">${transfers.map(t => `<div class="border-b py-1">${t.fromStore} → ${t.toStore} : ${t.ref} (${t.qty}) - ${t.status}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('createTransferBtn').onclick = async () => {
                const from = document.getElementById('fromStore').value;
                const to = document.getElementById('toStore').value;
                const ref = document.getElementById('transferRef').value;
                const qty = parseInt(document.getElementById('transferQty').value);
                await db.ref('transfers').push().set({ fromStore: from, toStore: to, ref, qty, status: "en attente", createdAt: new Date().toISOString() });
                logAction(`Transfert ${ref} de ${from} vers ${to}`);
                renderCurrentTab();
            };
        }

        // ========== DÉPENSES ==========
        async function renderExpenses(container) {
            const snapshot = await db.ref('expenses').once('value');
            const expenses = [];
            snapshot.forEach(child => expenses.push(child.val()));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>💰 Enregistrer Bon d'Achat Fournisseur</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="supplier" placeholder="Fournisseur" class="border p-2">
                        <input id="amountExp" type="number" placeholder="Montant" class="border p-2">
                        <input id="descExp" placeholder="Motif" class="border p-2">
                        <button id="addExpenseBtn" class="bg-yellow-600 text-white p-2 rounded">Ajouter Dépense</button>
                    </div>
                    <div id="expenseList" class="mt-4">${expenses.map(e => `<div>${e.supplier} - ${e.amount} DH : ${e.desc}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('addExpenseBtn').onclick = async () => {
                await db.ref('expenses').push().set({
                    supplier: document.getElementById('supplier').value,
                    amount: parseFloat(document.getElementById('amountExp').value),
                    desc: document.getElementById('descExp').value,
                    date: new Date().toISOString()
                });
                renderCurrentTab();
            };
        }

        // ========== CRÉDITS CLIENTS ==========
        async function renderCredits(container) {
            const snapshot = await db.ref('debts').orderByChild('paid').equalTo(false).once('value');
            const debts = [];
            snapshot.forEach(child => debts.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>💳 Crédits Clients</h2>
                    <table class="min-w-full border"><thead><tr><th>Client</th><th>Montant</th><th>Date</th><th>Action</th></tr></thead><tbody>
                        ${debts.map(d => `<tr><td class="border p-1">${d.customerName}</td><td class="border p-1">${d.amount} DH</td><td class="border p-1">${new Date(d.date).toLocaleDateString()}</td><td class="border p-1"><button data-id="${d.id}" class="payDebtBtn bg-green-500 text-white px-2 rounded">Marquer Payé</button></td></tr>`).join('')}
                    </tbody>}</table>
                </div>
            `;
            document.querySelectorAll('.payDebtBtn').forEach(btn => {
                btn.onclick = async () => {
                    await db.ref('debts/' + btn.dataset.id).update({ paid: true });
                    renderCurrentTab();
                };
            });
        }

        // ========== GESTION MAGASINS (CORRIGÉE) ==========
        async function renderStores(container) {
            // Recharger la liste des magasins
            await loadStores();
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>🏢 Gestion Magasins</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="storeName" placeholder="Nom du magasin" class="border p-2 flex-1">
                        <input id="storeLocation" placeholder="Adresse" class="border p-2 flex-1">
                        <button id="addStoreBtn" class="bg-green-600 text-white p-2 rounded">➕ Ajouter magasin</button>
                    </div>
                    <div id="storesList" class="mt-4">
                        ${storesList.map(s => `
                            <div class="flex justify-between items-center border-b py-2">
                                <div><strong>${s.name}</strong> - ${s.location || ''}</div>
                                <button data-id="${s.id}" class="deleteStoreBtn bg-red-500 text-white px-2 py-1 rounded text-sm">Supprimer</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('addStoreBtn').onclick = async () => {
                const name = document.getElementById('storeName').value.trim();
                const location = document.getElementById('storeLocation').value.trim();
                if (!name) return alert("Nom requis");
                await db.ref('stores').push().set({
                    name: name,
                    location: location,
                    createdAt: new Date().toISOString()
                });
                await loadStores();
                renderCurrentTab();
            };
            document.querySelectorAll('.deleteStoreBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer ce magasin ? Tous les produits associés resteront orphelins.")) {
                        await db.ref('stores/' + btn.dataset.id).remove();
                        await loadStores();
                        renderCurrentTab();
                    }
                };
            });
        }

        // ========== UTILISATEURS (avec suppression possible) ==========
        async function renderUsers(container) {
            const snapshot = await db.ref('users').once('value');
            const users = [];
            snapshot.forEach(child => users.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>👥 Gestion utilisateurs (Super Admin)</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="newUserEmail" placeholder="Email" class="border p-2 flex-1">
                        <select id="newUserRole" class="border p-2"><option value="manager">Manager</option><option value="vendeur">Vendeur</option></select>
                        <select id="newUserStore" class="border p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <button id="createUserBtn" class="bg-indigo-600 text-white p-2 rounded">Créer</button>
                    </div>
                    <div class="mt-4">
                        ${users.map(u => `
                            <div class="flex justify-between items-center border-b py-2">
                                <div>${u.email} - <strong>${u.role}</strong> ${u.storeId ? '(magasin: '+storesList.find(s=>s.id===u.storeId)?.name+')' : ''}</div>
                                ${u.email !== currentUser?.email ? `<button data-id="${u.id}" class="deleteUserBtn bg-red-500 text-white px-2 py-1 rounded text-sm">Supprimer</button>` : '<span class="text-gray-400 text-sm">(vous)</span>'}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('createUserBtn').onclick = async () => {
                const email = document.getElementById('newUserEmail').value;
                const role = document.getElementById('newUserRole').value;
                const storeId = document.getElementById('newUserStore').value;
                const pwd = "password123";
                try {
                    const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await db.ref('users/' + userCred.user.uid).set({
                        name: email.split('@')[0],
                        email: email,
                        role: role,
                        storeId: storeId,
                        createdAt: new Date().toISOString()
                    });
                    alert(`Utilisateur créé. Mot de passe: ${pwd}`);
                    renderCurrentTab();
                } catch (err) {
                    alert("Erreur: " + err.message);
                }
            };
            document.querySelectorAll('.deleteUserBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer définitivement cet utilisateur ?")) {
                        const uid = btn.dataset.id;
                        // Supprimer de l'authentification (nécessite fonction cloud ou admin SDK, on supprime juste la base)
                        await db.ref('users/' + uid).remove();
                        alert("Utilisateur supprimé de la base. Si vous voulez aussi supprimer son compte Auth, utilisez la console Firebase.");
                        renderCurrentTab();
                    }
                };
            });
        }

        // ========== JOURNAUX ==========
        async function renderLogs(container) {
            const snapshot = await db.ref('actionLogs').orderByChild('timestamp').limitToLast(50).once('value');
            const logs = [];
            snapshot.forEach(child => logs.push(child.val()));
            container.innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2>📜 Journaux d'actions</h2><ul class="list-disc pl-5">${logs.reverse().map(l => `<li>${l.action} - ${l.user} - ${new Date(l.timestamp).toLocaleString()}</li>`).join('')}</ul></div>`;
        }

        // ========== RAPPORTS ==========
        async function renderReports(container) {
            container.innerHTML = `<div class="print-area bg-white p-5 rounded-xl shadow"><h2 class="text-xl">📄 Rapport Mensuel</h2><button onclick="window.print()" class="bg-gray-700 text-white p-2 rounded no-print">🖨️ Imprimer</button><div id="reportContent">(Génération automatique des ventes du mois à implémenter)</div></div>`;
        }

        // ========== AUTHENTIFICATION ==========
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!password) { setMessage("Veuillez saisir le mot de passe.", true); return; }
            setMessage("🔐 Connexion en cours...");
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;
                const userData = await getOrCreateUserInRTDB(user);
                if (!userData || userData.role !== 'super_admin') {
                    setMessage("⛔ Accès refusé : vous n'êtes pas super_admin.", true);
                    await auth.signOut();
                    return;
                }
                currentUser = { uid: user.uid, email: user.email, role: userData.role, storeId: userData.storeId };
                currentUserRole = userData.role;
                currentStoreId = userData.storeId;
                await loadStores();
                if (currentUserRole !== 'super_admin' && !currentStoreId && storesList.length) currentStoreId = storesList[0].id;
                document.getElementById('roleBadge').innerText = currentUserRole;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                renderDashboard();
                setMessage("✅ Connexion réussie !");
            } catch (err) {
                console.error(err);
                setMessage("❌ " + (err.message || "Email ou mot de passe incorrect"), true);
            }
        };

        logoutBtn.onclick = async () => {
            await auth.signOut();
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            setMessage("Déconnecté.");
        };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userData = await getOrCreateUserInRTDB(user);
                if (!userData || userData.role !== 'super_admin') {
                    await auth.signOut();
                    authSection.classList.remove('hidden');
                    dashboardSection.classList.add('hidden');
                } else {
                    currentUser = { uid: user.uid, email: user.email, role: userData.role, storeId: userData.storeId };
                    currentUserRole = userData.role;
                    currentStoreId = userData.storeId;
                    await loadStores();
                    if (currentUserRole !== 'super_admin' && !currentStoreId && storesList.length) currentStoreId = storesList[0].id;
                    document.getElementById('roleBadge').innerText = currentUserRole;
                    authSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    renderDashboard();
                }
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
