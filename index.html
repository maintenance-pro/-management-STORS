<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management-Stors | Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100">

    <div id="app">
        <div id="authSection" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-800 to-indigo-900">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
                <div class="text-center mb-6">
                    <i class="fas fa-warehouse text-5xl text-indigo-600"></i>
                    <h1 class="text-2xl font-bold">Management-Stors</h1>
                    <p class="text-gray-500">ERP Multi‑Magasin</p>
                </div>
                <div>
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-3" value="lihanbello05@gmail.com">
                    <input type="password" id="loginPassword" placeholder="Mot de passe" class="w-full p-3 border rounded-lg mb-4">
                    <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Connexion</button>
                </div>
                <div id="infoMessage" class="text-center text-sm mt-3 p-2 rounded-lg bg-gray-100 text-gray-700"></div>
            </div>
        </div>

        <div id="dashboardSection" class="hidden">
            <div class="bg-white shadow px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl font-bold">✅ Dashboard Administrateur</h1>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1 rounded-lg">Déconnexion</button>
            </div>
            <div class="p-6">
                <div class="bg-white rounded-xl shadow p-6">
                    <h2 class="text-2xl font-bold">Bienvenue, <span id="userNameSpan"></span> !</h2>
                    <p class="text-green-600 mt-2">Accès super_admin accordé.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION FIREBASE (CORRECTE) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcICHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980",
            measurementId: "G-QZ9W62HWQS"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Éléments DOM
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const infoMessage = document.getElementById('infoMessage');

        // Liste des emails autorisés comme super_admin (vous pouvez en ajouter)
        const AUTHORIZED_ADMINS = [
            'admin@store.com',
            'lihanbello05@gmail.com'
        ];

        function setMessage(msg, isError = false) {
            infoMessage.innerText = msg;
            infoMessage.className = "text-center text-sm mt-3 p-2 rounded-lg " + (isError ? "bg-red-100 text-red-700" : "bg-green-100 text-green-700");
            console.log(msg);
        }

        // Récupère ou crée l'utilisateur dans Realtime Database
        async function getOrCreateUserInRTDB(user) {
            const uid = user.uid;
            const email = user.email;
            try {
                const snapshot = await db.ref('users/' + uid).once('value');
                if (snapshot.exists()) {
                    return snapshot.val();
                } else {
                    // Utilisateur authentifié mais absent de la base
                    if (AUTHORIZED_ADMINS.includes(email)) {
                        const userData = {
                            name: email.split('@')[0],
                            email: email,
                            role: 'super_admin',
                            storeId: null,
                            createdAt: new Date().toISOString()
                        };
                        await db.ref('users/' + uid).set(userData);
                        setMessage("✅ Compte administrateur créé automatiquement.");
                        return userData;
                    } else {
                        setMessage("⛔ Accès refusé : votre email n'est pas autorisé.", true);
                        return null;
                    }
                }
            } catch (err) {
                console.error("Erreur d'accès à la base:", err);
                setMessage("❌ Impossible de lire la base de données. Vérifiez les règles de sécurité.", true);
                return null;
            }
        }

        // Connexion
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!password) {
                setMessage("Veuillez saisir votre mot de passe.", true);
                return;
            }
            setMessage("🔐 Connexion en cours...");

            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;
                const userData = await getOrCreateUserInRTDB(user);

                if (!userData || userData.role !== 'super_admin') {
                    setMessage("⛔ Accès refusé : vous n'êtes pas super_admin.", true);
                    await auth.signOut();
                    return;
                }

                // Succès : afficher le dashboard
                document.getElementById('userNameSpan').innerText = userData.name || email;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                setMessage("✅ Connexion réussie !");
            } catch (err) {
                console.error(err);
                let errorMsg = err.message;
                if (err.code === 'auth/user-not-found') errorMsg = "Aucun compte associé à cet email.";
                else if (err.code === 'auth/wrong-password') errorMsg = "Mot de passe incorrect.";
                else if (err.code === 'auth/invalid-email') errorMsg = "Email invalide.";
                else if (err.code === 'auth/api-key-not-valid') errorMsg = "Clé API invalide. Vérifiez la configuration Firebase.";
                setMessage("❌ " + errorMsg, true);
            }
        };

        // Déconnexion
        logoutBtn.onclick = async () => {
            await auth.signOut();
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            setMessage("Déconnecté.");
        };

        // État de l'authentification (persistance)
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userData = await getOrCreateUserInRTDB(user);
                if (!userData || userData.role !== 'super_admin') {
                    await auth.signOut();
                    authSection.classList.remove('hidden');
                    dashboardSection.classList.add('hidden');
                } else {
                    document.getElementById('userNameSpan').innerText = userData.name || user.email;
                    authSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                }
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
