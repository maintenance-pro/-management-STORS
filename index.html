<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Management-Stors | ERP Moderne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* Design Moderne Industriel */
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0056b3, #003d82);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0066cc, #004099);
            transform: scale(1.02);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffcc00, #e6b800);
            color: #1a1a1a;
        }
        .btn-success {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
        }
        input, select, textarea {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            color: #f0f0f0;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 0 2px rgba(0,86,179,0.3);
        }
        .tab-active {
            background: rgba(0,86,179,0.2);
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
        }
        .tab-inactive {
            color: #aaa;
        }
        .tab-inactive:hover {
            background: rgba(255,255,255,0.05);
        }
        .badge {
            background: #0056b3;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .low-stock {
            border-left: 4px solid #ffcc00;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="authSection" class="flex items-center justify-center min-h-screen">
        <div class="glass-card p-8 w-96">
            <div class="text-center mb-6">
                <i class="fas fa-industry text-5xl text-[#0056b3]"></i>
                <h1 class="text-2xl font-bold mt-2 text-white">Management-Stors</h1>
                <p class="text-gray-400">ERP Moderne Multi‑Magasin</p>
            </div>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full mb-3" value="lihanbello05@gmail.com">
            <input type="password" id="loginPassword" placeholder="Mot de passe" class="w-full mb-4">
            <button id="loginBtn" class="btn-primary w-full text-white font-bold py-2 rounded-xl">Connexion</button>
            <div id="infoMessage" class="text-center text-sm mt-3 text-gray-400"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="hidden">
        <!-- Header -->
        <div class="sticky top-0 z-30 bg-black/80 backdrop-blur-lg border-b border-gray-800 px-6 py-3 flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center space-x-3">
                <i class="fas fa-charging-station text-2xl text-[#0056b3]"></i>
                <h1 class="text-xl font-bold text-white">Management-Stors</h1>
                <span id="roleBadge" class="badge text-white"></span>
            </div>
            <div class="flex items-center gap-4">
                <span id="storeSelectorContainer"></span>
                <button id="logoutBtn" class="bg-red-700 hover:bg-red-800 text-white px-4 py-1 rounded-full text-sm transition">Déconnexion</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex flex-wrap gap-1 px-4 pt-2" id="tabNav"></div>

        <!-- Contenu principal -->
        <div id="mainContent" class="p-6"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcICHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Global state
        let currentUser = null, currentUserRole = null, currentStoreId = null, storesList = [], activeTab = "dashboard";
        let cartItems = [];
        let barcodeBuffer = "", barcodeTimeout = null;

        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const infoMessage = document.getElementById('infoMessage');

        const AUTHORIZED_ADMINS = ['admin@store.com', 'lihanbello05@gmail.com'];

        function setMessage(msg, isError = false) {
            if (infoMessage) infoMessage.innerText = msg;
            console.log(msg);
        }

        // ========== USER & ROLES ==========
        async function getOrCreateUserInRTDB(user) {
            const uid = user.uid;
            const email = user.email;
            const snapshot = await db.ref('users/' + uid).once('value');
            if (snapshot.exists()) return snapshot.val();
            if (AUTHORIZED_ADMINS.includes(email)) {
                const userData = { name: email.split('@')[0], email, role: 'super_admin', storeId: null, createdAt: new Date().toISOString() };
                await db.ref('users/' + uid).set(userData);
                return userData;
            }
            return null;
        }

        async function loadStores() {
            const snapshot = await db.ref('stores').once('value');
            const stores = [];
            snapshot.forEach(child => stores.push({ id: child.key, ...child.val() }));
            if (stores.length === 0 && currentUserRole === 'super_admin') {
                await db.ref('stores').push().set({ name: "Magasin Central", location: "Casablanca", createdAt: new Date().toISOString() });
                await db.ref('stores').push().set({ name: "Magasin Sud", location: "Marrakech", createdAt: new Date().toISOString() });
                return loadStores();
            }
            storesList = stores;
            return storesList;
        }

        async function logAction(action, details = {}) {
            if (!currentUser) return;
            await db.ref('actionLogs').push().set({ action, user: currentUser.email, details, timestamp: new Date().toISOString() });
        }

        async function getProducts(storeId = null) {
            const snapshot = await db.ref('inventory').once('value');
            const products = [];
            snapshot.forEach(child => {
                const prod = { id: child.key, ...child.val() };
                if (storeId && prod.storeId !== storeId) return;
                products.push(prod);
            });
            return products;
        }

        // ========== VENTES ==========
        async function addToCart(productId, productRef, productName, price, qty = 1) {
            const existing = cartItems.find(i => i.id === productId);
            if (existing) existing.qty += qty;
            else cartItems.push({ id: productId, ref: productRef, name: productName, price, qty });
            renderCartUI();
        }

        function renderCartUI() {
            const cartDiv = document.getElementById('cartContainer');
            if (!cartDiv) return;
            const total = cartItems.reduce((s,i) => s + i.qty * i.price, 0);
            cartDiv.innerHTML = `
                <h3 class="font-bold text-lg mb-2">🛒 Panier</h3>
                ${cartItems.map((item, idx) => `
                    <div class="flex justify-between items-center border-b border-gray-700 py-2">
                        <span><strong>${item.ref}</strong> - ${item.name}</span>
                        <span>${item.qty} x ${item.price} DH</span>
                        <button data-cartidx="${idx}" class="removeCartItem text-red-400 hover:text-red-300">❌</button>
                    </div>
                `).join('')}
                <div class="font-bold mt-3 text-xl">Total: ${total} DH</div>
                <div class="mt-4 flex flex-col gap-2">
                    <input id="customerName" placeholder="Nom du client" class="w-full bg-gray-700 rounded-lg p-2">
                    <div class="flex gap-2">
                        <button id="sellCashBtn" class="btn-primary flex-1 text-white py-2 rounded-lg">💵 Espèce</button>
                        <button id="sellCreditBtn" class="btn-warning flex-1 py-2 rounded-lg">📝 Crédit</button>
                    </div>
                </div>
            `;
            document.querySelectorAll('.removeCartItem').forEach(btn => {
                btn.onclick = () => {
                    cartItems.splice(parseInt(btn.dataset.cartidx), 1);
                    renderCartUI();
                };
            });
            document.getElementById('sellCashBtn')?.addEventListener('click', () => finalizeSale(false));
            document.getElementById('sellCreditBtn')?.addEventListener('click', () => finalizeSale(true));
        }

        async function finalizeSale(isCredit) {
            if (cartItems.length === 0) return alert("Panier vide");
            const customer = document.getElementById('customerName')?.value.trim() || "Client inconnu";
            for (let item of cartItems) {
                const prodRef = db.ref('inventory/' + item.id);
                const snap = await prodRef.once('value');
                const currentStock = snap.val().qty;
                if (currentStock < item.qty) {
                    alert(`Stock insuffisant pour ${item.ref}`);
                    return;
                }
                await prodRef.update({ qty: currentStock - item.qty });
                // Historique de sortie
                await db.ref('history').push().set({
                    productId: item.id, productRef: item.ref, productName: item.name,
                    quantity: item.qty, oldStock: currentStock, newStock: currentStock - item.qty,
                    reason: "vente", userId: currentUser.uid, userEmail: currentUser.email,
                    storeId: currentStoreId, date: new Date().toISOString()
                });
            }
            const saleRef = db.ref('sales').push();
            await saleRef.set({
                items: cartItems, total: cartItems.reduce((s,i)=>s+i.qty*i.price,0),
                customerName: customer, paid: !isCredit, date: new Date().toISOString(),
                storeId: currentStoreId, sellerId: currentUser.uid
            });
            if (isCredit) {
                await db.ref('debts').push().set({
                    customerName: customer, amount: cartItems.reduce((s,i)=>s+i.qty*i.price,0),
                    paid: false, saleId: saleRef.key, date: new Date().toISOString()
                });
            }
            logAction(`Vente ${isCredit ? 'crédit' : 'espèce'} de ${cartItems.length} articles`);
            cartItems = [];
            renderCartUI();
            renderCurrentTab();
        }

        // Scanner
        function initBarcodeListener() {
            document.removeEventListener('keydown', barcodeKeyHandler);
            document.addEventListener('keydown', barcodeKeyHandler);
        }
        function barcodeKeyHandler(e) {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) {
                    e.preventDefault();
                    searchAndAddProduct(barcodeBuffer);
                    barcodeBuffer = "";
                    if (barcodeTimeout) clearTimeout(barcodeTimeout);
                }
                return;
            }
            if (e.key.length === 1) {
                barcodeBuffer += e.key;
                if (barcodeTimeout) clearTimeout(barcodeTimeout);
                barcodeTimeout = setTimeout(() => { barcodeBuffer = ""; }, 100);
            }
        }
        async function searchAndAddProduct(barcode) {
            const snapshot = await db.ref('inventory').orderByChild('ref').equalTo(barcode).once('value');
            let product = null;
            snapshot.forEach(child => {
                const p = { id: child.key, ...child.val() };
                if (currentUserRole !== 'super_admin' && p.storeId !== currentStoreId) return;
                product = p;
            });
            if (!product) { alert("Produit non trouvé"); return; }
            addToCart(product.id, product.ref, product.designation, product.salePrice, 1);
        }

        // ========== RENDU DES ONGLETS ==========
        function renderDashboard() {
            const role = currentUserRole;
            const tabs = [
                { id: "dashboard", label: "📊 Dashboard", roles: ["super_admin","store-manager","vendeur"] },
                { id: "pos", label: "🛒 Vente / Scanner", roles: ["super_admin","store-manager","vendeur"] },
                { id: "inventory", label: "📦 Stock", roles: ["super_admin","store-manager","vendeur"] },
                { id: "withdraw", label: "📤 Sortie", roles: ["super_admin","store-manager"] },
                { id: "history", label: "📜 Historique", roles: ["super_admin","store-manager"] },
                { id: "reorder", label: "🔄 Réassort", roles: ["super_admin","store-manager"] },
                { id: "transfers", label: "🚚 Transfert", roles: ["super_admin","store-manager"] },
                { id: "expenses", label: "💰 Dépenses", roles: ["super_admin","store-manager"] },
                { id: "credits", label: "💳 Crédits", roles: ["super_admin","store-manager","vendeur"] },
                { id: "stores", label: "🏪 Magasins", roles: ["super_admin"] },
                { id: "users", label: "👥 Utilisateurs", roles: ["super_admin"] },
                { id: "couriers", label: "🏍️ Livreurs", roles: ["super_admin","store-manager"] },
                { id: "logs", label: "📋 Logs", roles: ["super_admin"] }
            ];
            const tabNav = document.getElementById('tabNav');
            tabNav.innerHTML = tabs.filter(t => t.roles.includes(role)).map(t => `
                <button data-tab="${t.id}" class="px-4 py-2 rounded-t-lg transition ${activeTab === t.id ? 'tab-active' : 'tab-inactive'}">
                    ${t.label}
                </button>
            `).join('');
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.onclick = () => { activeTab = btn.dataset.tab; renderDashboard(); };
            });
            // Store selector
            const storeSelector = document.getElementById('storeSelectorContainer');
            if (role === "super_admin" || role === "store-manager") {
                storeSelector.innerHTML = `<select id="storeSelect" class="bg-gray-800 border-gray-700 rounded-lg p-1 text-sm"><option value="">Tous</option>${storesList.map(s => `<option value="${s.id}" ${currentStoreId === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}</select>`;
                document.getElementById('storeSelect').onchange = (e) => { currentStoreId = e.target.value || null; renderCurrentTab(); };
            } else {
                const store = storesList.find(s => s.id === currentStoreId);
                storeSelector.innerHTML = `<span class="text-gray-400">${store?.name || 'Magasin'}</span>`;
            }
            renderCurrentTab();
        }

        async function renderCurrentTab() {
            const container = document.getElementById('mainContent');
            if (activeTab === "dashboard") await renderDashboardHome(container);
            else if (activeTab === "pos") await renderPOS(container);
            else if (activeTab === "inventory") await renderInventory(container);
            else if (activeTab === "withdraw") await renderWithdraw(container);
            else if (activeTab === "history") await renderHistory(container);
            else if (activeTab === "reorder") await renderReorder(container);
            else if (activeTab === "transfers") await renderTransfers(container);
            else if (activeTab === "expenses") await renderExpenses(container);
            else if (activeTab === "credits") await renderCredits(container);
            else if (activeTab === "stores") await renderStores(container);
            else if (activeTab === "users") await renderUsers(container);
            else if (activeTab === "couriers") await renderCouriers(container);
            else if (activeTab === "logs") await renderLogs(container);
        }

        // Dashboard
        async function renderDashboardHome(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card p-5">
                        <h2 class="text-xl font-bold mb-3 text-[#ffcc00]">⚠️ Alertes Stock Faible</h2>
                        ${lowStock.length ? lowStock.map(p => `<div class="low-stock bg-gray-800 p-3 rounded-lg mb-2 flex justify-between"><span><strong>${p.ref}</strong> ${p.designation}</span><span>Stock: ${p.qty} / Seuil: ${p.min_threshold||5}</span></div>`).join('') : '<p class="text-green-400">✅ Tout est approvisionné</p>'}
                    </div>
                    <div class="glass-card p-5">
                        <h2 class="text-xl font-bold mb-3">⚡ Actions rapides</h2>
                        <button onclick="document.querySelector('[data-tab=\"pos\"]').click()" class="btn-primary w-full text-left p-2 rounded mb-2">🛒 Nouvelle vente</button>
                        <button onclick="document.querySelector('[data-tab=\"inventory\"]').click()" class="btn-primary w-full text-left p-2 rounded mb-2">📦 Gérer le stock</button>
                        <button onclick="document.querySelector('[data-tab=\"reorder\"]').click()" class="btn-warning w-full text-left p-2 rounded mb-2">📋 Commander réassort</button>
                        <button id="exportExcelBtn" class="bg-green-700 w-full text-left p-2 rounded">📎 Exporter commandes (Excel)</button>
                    </div>
                </div>
            `;
            document.getElementById('exportExcelBtn')?.addEventListener('click', async () => {
                const products = await getProducts(null);
                const low = products.filter(p => p.qty <= (p.min_threshold||5));
                const data = low.map(p => ({ Référence: p.ref, Désignation: p.designation, Stock: p.qty, "À commander": Math.max((p.min_threshold||5)-p.qty+5,5), "Prix achat": p.purchasePrice }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Commandes");
                XLSX.writeFile(wb, `commandes_${new Date().toISOString().slice(0,19)}.xlsx`);
            });
        }

        // POS avec client et paiement
        async function renderPOS(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card p-5">
                        <h2 class="text-xl font-bold mb-3">🔍 Recherche / Scanner</h2>
                        <input type="text" id="searchProduct" placeholder="Nom ou référence..." class="w-full mb-3">
                        <div id="searchResults" class="max-h-96 overflow-y-auto"></div>
                    </div>
                    <div id="cartContainer" class="glass-card p-5"></div>
                </div>
            `;
            initBarcodeListener();
            renderCartUI();
            const searchInput = document.getElementById('searchProduct');
            searchInput.addEventListener('input', async (e) => {
                const kw = e.target.value.toLowerCase();
                if (kw.length < 2) return;
                const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
                const results = products.filter(p => p.designation.toLowerCase().includes(kw) || p.ref.toLowerCase().includes(kw));
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = results.slice(0,15).map(p => `
                    <div class="bg-gray-800 p-3 rounded-lg mb-2 flex justify-between items-center">
                        <div><strong>${p.ref}</strong> - ${p.designation}<br><span class="text-sm">${p.qty} dispo - ${p.salePrice} DH</span></div>
                        <button data-id="${p.id}" data-ref="${p.ref}" data-name="${p.designation}" data-price="${p.salePrice}" class="addToCartBtn btn-primary text-white px-3 py-1 rounded">➕ Ajouter</button>
                    </div>
                `).join('');
                document.querySelectorAll('.addToCartBtn').forEach(btn => {
                    btn.onclick = () => addToCart(btn.dataset.id, btn.dataset.ref, btn.dataset.name, parseFloat(btn.dataset.price), 1);
                });
            });
        }

        // Inventory, Withdraw, History, Reorder, Transfers, Expenses, Credits, Stores, Users, Logs (simplifiés mais fonctionnels)
        async function renderInventory(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `<div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">📦 Stock</h2><button id="addProductBtn" class="btn-primary px-4 py-2 rounded mb-4">➕ Nouveau produit</button><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Ref</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Prix Vente</th><th>Actions</th></tr></thead><tbody id="invBody"></tbody></table></div></div>`;
            const tbody = document.getElementById('invBody');
            tbody.innerHTML = products.map(p => `<tr><td>${p.ref}</td><td>${p.designation}</td><td><input type="number" data-id="${p.id}" class="stockInput w-20 bg-gray-700 rounded p-1" value="${p.qty}"></td><td><input type="number" data-thresh="${p.id}" class="threshInput w-20 bg-gray-700 rounded p-1" value="${p.min_threshold||5}"></td><td>${p.purchasePrice} DH</td><td>${p.salePrice} DH</td><td><button data-id="${p.id}" class="updateBtn text-blue-400">💾</button> <button data-id="${p.id}" class="deleteBtn text-red-400">🗑️</button></td></tr>`).join('');
            document.getElementById('addProductBtn').onclick = async () => {
                const ref = prompt("Référence"); const des = prompt("Désignation"); const qty = parseInt(prompt("Qté initiale"))||0; const price = parseFloat(prompt("Prix achat"));
                if(ref && des && price) await db.ref('inventory').push().set({ ref, designation: des, qty, purchasePrice: price, salePrice: price*1.2, min_threshold:5, storeId: currentStoreId || storesList[0]?.id, createdAt: new Date().toISOString() });
                renderCurrentTab();
            };
            document.querySelectorAll('.updateBtn').forEach(btn => btn.onclick = async () => {
                const id = btn.dataset.id;
                const newQty = parseInt(document.querySelector(`.stockInput[data-id="${id}"]`).value);
                const newThresh = parseInt(document.querySelector(`.threshInput[data-id="${id}"]`).value);
                await db.ref('inventory/'+id).update({ qty: newQty, min_threshold: newThresh });
                renderCurrentTab();
            });
            document.querySelectorAll('.deleteBtn').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ?")) await db.ref('inventory/'+btn.dataset.id).remove(); renderCurrentTab(); });
        }

        async function renderWithdraw(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `<div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">📤 Sortie de stock</h2><select id="prodSelect" class="w-full mb-3">${products.map(p => `<option value="${p.id}" data-stock="${p.qty}" data-name="${p.designation}">${p.ref} - ${p.designation} (stock: ${p.qty})</option>`).join('')}</select><input type="number" id="withdrawQty" placeholder="Quantité à retirer" class="w-full mb-3"><select id="reason" class="w-full mb-3"><option>vente</option><option>casse</option><option>transfert</option></select><button id="doWithdraw" class="btn-primary px-4 py-2 rounded">Effectuer retrait</button><div id="wMsg" class="mt-3"></div></div>`;
            document.getElementById('doWithdraw').onclick = async () => {
                const id = document.getElementById('prodSelect').value;
                const qty = parseInt(document.getElementById('withdrawQty').value);
                const reason = document.getElementById('reason').value;
                const selected = document.getElementById('prodSelect').options[document.getElementById('prodSelect').selectedIndex];
                const currentStock = parseInt(selected.dataset.stock);
                if(qty > currentStock) { document.getElementById('wMsg').innerText = "Stock insuffisant"; return; }
                const newStock = currentStock - qty;
                await db.ref('inventory/'+id).update({ qty: newStock });
                await db.ref('history').push().set({ productId: id, productRef: selected.text.split('-')[0], productName: selected.dataset.name, quantity: qty, oldStock: currentStock, newStock: newStock, reason, userId: currentUser.uid, date: new Date().toISOString() });
                document.getElementById('wMsg').innerText = `Retrait effectué. Nouveau stock: ${newStock}`;
                setTimeout(()=>renderCurrentTab(), 1000);
            };
        }

        async function renderHistory(container) {
            const snap = await db.ref('history').orderByChild('date').limitToLast(100).once('value');
            const list = []; snap.forEach(c=>list.push(c.val()));
            list.reverse();
            container.innerHTML = `<div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">📜 Historique des sorties</h2><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Date</th><th>Produit</th><th>Qté</th><th>Ancien stock</th><th>Nouveau</th><th>Motif</th><th>Utilisateur</th></tr></thead><tbody>${list.map(h => `<tr><td>${new Date(h.date).toLocaleString()}</td><td>${h.productRef}</td><td>${h.quantity}</td><td>${h.oldStock}</td><td>${h.newStock}</td><td>${h.reason}</td><td>${h.userEmail||''}</td></tr>`).join('')}</tbody></table></div></div>`;
        }

        async function renderReorder(container) {
            const products = await getProducts(null);
            const low = products.filter(p => p.qty <= (p.min_threshold||5));
            container.innerHTML = `<div class="glass-card p-5"><h2 class="text-2xl font-bold mb-4">🔄 Réassort</h2><table class="w-full"><thead><tr><th>Magasin</th><th>Réf</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>À commander</th></tr></thead><tbody>${low.map(p => `<tr><td>${storesList.find(s=>s.id===p.storeId)?.name||p.storeId}</td><td>${p.ref}</td><td>${p.designation}</td><td class="text-red-400">${p.qty}</td><td>${p.min_threshold||5}</td><td>${Math.max((p.min_threshold||5)-p.qty+5,5)}</td></tr>`).join('')}</tbody></table><button id="expCsv" class="btn-primary mt-4 px-4 py-2 rounded">📎 Exporter CSV</button></div>`;
            document.getElementById('expCsv')?.addEventListener('click', () => {
                let csv = "Réf,Designation,À commander\n"+low.map(p=>`${p.ref},${p.designation},${Math.max((p.min_threshold||5)-p.qty+5,5)}`).join("\n");
                const blob = new Blob([csv], {type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="commandes.csv"; a.click();
            });
        }

        async function renderTransfers(container) {
            const transfers = []; (await db.ref('transfers').once('value')).forEach(c=>transfers.push(c.val()));
            container.innerHTML = `<div class="glass-card p-5"><h2>🚚 Transfert</h2><div class="flex flex-wrap gap-2"><select id="fromStore">${storesList.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><select id="toStore">${storesList.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><input id="refProd" placeholder="Référence"><input id="qtyTransfer" type="number" placeholder="Qté"><button id="doTransfer" class="btn-primary px-3 py-1 rounded">Créer</button></div><div class="mt-4">${transfers.map(t=>`<div>${t.fromStore} → ${t.toStore} : ${t.ref} (${t.qty})</div>`).join('')}</div></div>`;
            document.getElementById('doTransfer').onclick = async () => {
                await db.ref('transfers').push().set({ fromStore: document.getElementById('fromStore').value, toStore: document.getElementById('toStore').value, ref: document.getElementById('refProd').value, qty: parseInt(document.getElementById('qtyTransfer').value), status: "en attente", createdAt: new Date().toISOString() });
                renderCurrentTab();
            };
        }

        async function renderExpenses(container) {
            const expenses = []; (await db.ref('expenses').once('value')).forEach(c=>expenses.push(c.val()));
            container.innerHTML = `<div class="glass-card p-5"><h2>💰 Dépenses</h2><div class="flex gap-2"><input id="supplier" placeholder="Fournisseur"><input id="amount" type="number" placeholder="Montant"><input id="desc" placeholder="Motif"><button id="addExp" class="btn-primary px-3 py-1 rounded">Ajouter</button></div><div class="mt-4">${expenses.map(e=>`<div>${e.supplier} - ${e.amount} DH : ${e.desc}</div>`).join('')}</div></div>`;
            document.getElementById('addExp').onclick = async () => { await db.ref('expenses').push().set({ supplier: document.getElementById('supplier').value, amount: parseFloat(document.getElementById('amount').value), desc: document.getElementById('desc').value, date: new Date().toISOString() }); renderCurrentTab(); };
        }

        async function renderCredits(container) {
            const debts = []; (await db.ref('debts').orderByChild('paid').equalTo(false).once('value')).forEach(c=>debts.push({id:c.key,...c.val()}));
            container.innerHTML = `<div class="glass-card p-5"><h2>💳 Crédits clients</h2><table class="w-full"><thead><tr><th>Client</th><th>Montant</th><th>Date</th><th>Action</th></tr></thead><tbody>${debts.map(d=>`<tr><td>${d.customerName}</td><td>${d.amount} DH</td><td>${new Date(d.date).toLocaleDateString()}</td><td><button data-id="${d.id}" class="payBtn bg-green-700 px-2 py-1 rounded">Payé</button></td></tr>`).join('')}</tbody></table></div>`;
            document.querySelectorAll('.payBtn').forEach(btn => btn.onclick = async () => { await db.ref('debts/'+btn.dataset.id).update({paid:true}); renderCurrentTab(); });
        }

        // Gestion magasins corrigée
        async function renderStores(container) {
            await loadStores();
            container.innerHTML = `<div class="glass-card p-5"><h2>🏪 Magasins</h2><div class="flex gap-2 mb-4"><input id="newStoreName" placeholder="Nom" class="flex-1"><input id="newStoreLoc" placeholder="Adresse" class="flex-1"><button id="addStoreBtn" class="btn-primary px-4 py-2 rounded">➕ Ajouter</button></div><div id="storesListContainer">${storesList.map(s=>`<div class="flex justify-between items-center border-b border-gray-700 py-2"><div><strong>${s.name}</strong> - ${s.location||''}</div><button data-id="${s.id}" class="delStoreBtn bg-red-700 px-3 py-1 rounded text-sm">Supprimer</button></div>`).join('')}</div></div>`;
            document.getElementById('addStoreBtn').onclick = async () => {
                const name = document.getElementById('newStoreName').value.trim();
                if(!name) return alert("Nom requis");
                await db.ref('stores').push().set({ name, location: document.getElementById('newStoreLoc').value, createdAt: new Date().toISOString() });
                await loadStores();
                renderCurrentTab();
            };
            document.querySelectorAll('.delStoreBtn').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ce magasin ?")) { await db.ref('stores/'+btn.dataset.id).remove(); await loadStores(); renderCurrentTab(); } });
        }

        async function renderUsers(container) {
            const users = []; (await db.ref('users').once('value')).forEach(c=>users.push({id:c.key,...c.val()}));
            container.innerHTML = `<div class="glass-card p-5"><h2>👥 Utilisateurs</h2><div class="flex gap-2 mb-4"><input id="userEmail" placeholder="Email"><select id="userRole"><option>manager</option><option>vendeur</option><option>super_admin</option></select><select id="userStore">${storesList.map(s=>`<option value="${s.id}">${s.name}</option>`)}</select><button id="createUserBtn" class="btn-primary px-3 py-1 rounded">Créer</button></div><div>${users.map(u=>`<div class="flex justify-between py-2 border-b"><span>${u.email} (${u.role})</span>${u.email !== currentUser?.email ? `<button data-id="${u.id}" class="delUserBtn text-red-400">Supprimer</button>` : ''}</div>`).join('')}</div></div>`;
            document.getElementById('createUserBtn').onclick = async () => {
                const email = document.getElementById('userEmail').value; const role = document.getElementById('userRole').value; const storeId = document.getElementById('userStore').value; const pwd = "password123";
                try { const cred = await auth.createUserWithEmailAndPassword(email, pwd); await db.ref('users/'+cred.user.uid).set({ name: email.split('@')[0], email, role, storeId, createdAt: new Date().toISOString() }); alert(`Créé: ${email} / ${pwd}`); renderCurrentTab(); } catch(e){ alert(e.message); }
            };
            document.querySelectorAll('.delUserBtn').forEach(btn => btn.onclick = async () => { await db.ref('users/'+btn.dataset.id).remove(); renderCurrentTab(); });
        }

        // Gestion des livreurs (coureurs)
        async function renderCouriers(container) {
            const couriers = []; (await db.ref('couriers').once('value')).forEach(c=>couriers.push({id:c.key,...c.val()}));
            container.innerHTML = `<div class="glass-card p-5"><h2>🏍️ Livreurs (Coureurs)</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"><input id="cName" placeholder="Nom complet" class="bg-gray-700"><input id="cVehicle" placeholder="Véhicule (moto/voiture)" class="bg-gray-700"><input id="cPhone" placeholder="Téléphone" class="bg-gray-700"><select id="cStatus" class="bg-gray-700"><option value="disponible">Disponible</option><option value="occupé">Occupé</option><option value="hors service">Hors service</option></select><button id="addCourierBtn" class="btn-primary col-span-2 py-2 rounded">➕ Ajouter un livreur</button></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="couriersList"></div></div>`;
            const listDiv = document.getElementById('couriersList');
            listDiv.innerHTML = couriers.map(c => `
                <div class="bg-gray-800 rounded-xl p-3 flex justify-between items-center">
                    <div><i class="fas fa-motorcycle mr-2"></i><strong>${c.name}</strong><br><span class="text-xs text-gray-400">${c.vehicle} - ${c.phone}</span><br><span class="text-xs ${c.status === 'disponible' ? 'text-green-400' : 'text-red-400'}">${c.status}</span></div>
                    <button data-id="${c.id}" class="delCourierBtn text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('addCourierBtn').onclick = async () => {
                const name = document.getElementById('cName').value.trim();
                if(!name) return alert("Nom requis");
                await db.ref('couriers').push().set({ name, vehicle: document.getElementById('cVehicle').value, phone: document.getElementById('cPhone').value, status: document.getElementById('cStatus').value, createdAt: new Date().toISOString() });
                renderCurrentTab();
            };
            document.querySelectorAll('.delCourierBtn').forEach(btn => btn.onclick = async () => { await db.ref('couriers/'+btn.dataset.id).remove(); renderCurrentTab(); });
        }

        async function renderLogs(container) {
            const logs = []; (await db.ref('actionLogs').orderByChild('timestamp').limitToLast(50).once('value')).forEach(c=>logs.push(c.val()));
            container.innerHTML = `<div class="glass-card p-5"><h2>📋 Logs</h2><ul class="list-disc pl-5">${logs.reverse().map(l=>`<li>${l.action} - ${l.user} - ${new Date(l.timestamp).toLocaleString()}</li>`).join('')}</ul></div>`;
        }

        // Auth
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!pwd) return setMessage("Mot de passe requis", true);
            try {
                const cred = await auth.signInWithEmailAndPassword(email, pwd);
                const userData = await getOrCreateUserInRTDB(cred.user);
                if (!userData || userData.role !== 'super_admin') throw new Error("Non autorisé");
                currentUser = { uid: cred.user.uid, email, role: userData.role, storeId: userData.storeId };
                currentUserRole = userData.role;
                currentStoreId = userData.storeId;
                await loadStores();
                document.getElementById('roleBadge').innerText = currentUserRole;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                renderDashboard();
                setMessage("Connecté");
            } catch (err) { setMessage("Erreur: " + err.message, true); }
        };
        logoutBtn.onclick = async () => { await auth.signOut(); location.reload(); };
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const ud = await getOrCreateUserInRTDB(user);
                if (!ud || ud.role !== 'super_admin') { await auth.signOut(); authSection.classList.remove('hidden'); dashboardSection.classList.add('hidden'); }
                else { currentUser = { uid: user.uid, email: user.email, role: ud.role, storeId: ud.storeId }; currentUserRole = ud.role; currentStoreId = ud.storeId; await loadStores(); document.getElementById('roleBadge').innerText = currentUserRole; authSection.classList.add('hidden'); dashboardSection.classList.remove('hidden'); renderDashboard(); }
            } else { authSection.classList.remove('hidden'); dashboardSection.classList.add('hidden'); }
        });
    </script>
</body>
</html>
