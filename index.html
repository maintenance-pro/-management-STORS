<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Management-Stors V7 | ERP Multi‑Magasin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; top: 0; left: 0; width: 100%; } .no-print { display: none; } }
        .alert-low-stock { background-color: #ffedd5; border-left: 6px solid #f97316; animation: pulseOrange 1s infinite; }
        @keyframes pulseOrange { 0% { border-left-color: #f97316; } 100% { border-left-color: #ffb347; } }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="app">
        <!-- Écran de connexion -->
        <div id="authSection" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-800 to-indigo-900">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
                <div class="text-center mb-6">
                    <i class="fas fa-warehouse text-5xl text-indigo-600"></i>
                    <h1 class="text-2xl font-bold mt-2">Management-Stors V7</h1>
                    <p class="text-gray-500">ERP Multi‑Magasin Pièces Auto</p>
                </div>
                <div>
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
                    <input type="password" id="loginPassword" placeholder="Mot de passe" class="w-full p-3 border rounded-lg mb-4">
                    <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Connexion</button>
                </div>
                <p class="text-center text-sm mt-4 text-gray-500">Super Admin par défaut : admin@store.com / admin123</p>
                <div id="initMessage" class="text-center text-xs text-gray-400 mt-2"></div>
            </div>
        </div>

        <!-- Tableau de bord principal -->
        <div id="dashboardSection" class="hidden">
            <div class="bg-white shadow-md px-6 py-3 flex justify-between items-center sticky top-0 z-30">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-warehouse text-indigo-600 text-2xl"></i>
                    <h1 class="text-xl font-bold">Management-Stors ERP</h1>
                    <span id="roleBadge" class="bg-gray-200 text-xs px-2 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="storeSelectorContainer"></span>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1 rounded-lg text-sm">Déconnexion</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 bg-gray-100 px-4 pt-4 border-b" id="tabNav"></div>
            <div id="mainContent" class="p-6"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyC6ra1yBkIcIHN5gOLGcc9128g0sTdA6g",
            authDomain: "stor-management.firebaseapp.com",
            databaseURL: "https://stor-management-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "stor-management",
            storageBucket: "stor-management.firebasestorage.app",
            messagingSenderId: "1080269685889",
            appId: "1:1080269685889:web:cfc06140be3b896f23b980"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Variables globales
        let currentUser = null;
        let currentUserRole = null;
        let currentStoreId = null;
        let storesList = [];
        let activeTab = "dashboard";
        let cartItems = [];
        let barcodeBuffer = "";
        let barcodeTimeout = null;

        // Éléments DOM
        const authSection = document.getElementById('authSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const initMessage = document.getElementById('initMessage');

        // ==================== FONCTIONS UTILITAIRES ====================
        async function logAction(action) {
            if (!currentUser) return;
            const logRef = db.ref('actionLogs').push();
            await logRef.set({
                action: action,
                user: currentUser.email,
                timestamp: new Date().toISOString()
            });
        }

        function setInfo(msg, isError = false) {
            if (initMessage) {
                initMessage.innerText = msg;
                initMessage.className = "text-center text-xs mt-2 " + (isError ? "text-red-500" : "text-gray-400");
            }
        }

        // ==================== INITIALISATION : CRÉATION SUPER ADMIN ====================
        async function initSuperAdmin() {
            setInfo("🔄 Vérification de la base...");
            try {
                const snapshot = await db.ref('users').once('value');
                if (!snapshot.exists()) {
                    setInfo("⚙️ Aucun utilisateur, création du Super Admin...");
                    // Créer dans Auth
                    try {
                        const userCred = await auth.createUserWithEmailAndPassword('admin@store.com', 'admin123');
                        const uid = userCred.user.uid;
                        await db.ref('users/' + uid).set({
                            name: 'Super Administrateur',
                            role: 'super_admin',
                            email: 'admin@store.com',
                            storeId: null,
                            createdAt: new Date().toISOString()
                        });
                        setInfo("✅ Compte Super Admin créé. Connectez-vous avec admin@store.com / admin123");
                    } catch (err) {
                        if (err.code === 'auth/email-already-exists') {
                            // Récupérer l'utilisateur existant
                            const userCred = await auth.signInWithEmailAndPassword('admin@store.com', 'admin123');
                            const uid = userCred.user.uid;
                            await db.ref('users/' + uid).set({
                                name: 'Super Administrateur',
                                role: 'super_admin',
                                email: 'admin@store.com',
                                storeId: null,
                                createdAt: new Date().toISOString()
                            });
                            setInfo("✅ Base mise à jour. Connectez-vous.");
                        } else {
                            setInfo("❌ Erreur: " + err.message, true);
                        }
                    }
                } else {
                    setInfo("✅ Base prête. Entrez vos identifiants.");
                }
            } catch (err) {
                console.error(err);
                setInfo("⚠️ Erreur de connexion à Firebase. Vérifiez les règles.", true);
            }
        }

        // ==================== CHARGEMENT DES MAGASINS ====================
        async function loadStores() {
            const snapshot = await db.ref('stores').once('value');
            const stores = [];
            snapshot.forEach(child => {
                stores.push({ id: child.key, ...child.val() });
            });
            if (stores.length === 0 && currentUserRole === 'super_admin') {
                // Création de deux magasins par défaut
                const store1 = db.ref('stores').push();
                await store1.set({ name: "Magasin Central", location: "Casablanca", createdAt: new Date().toISOString() });
                const store2 = db.ref('stores').push();
                await store2.set({ name: "Magasin Sud", location: "Marrakech", createdAt: new Date().toISOString() });
                return loadStores();
            }
            storesList = stores;
            return storesList;
        }

        // ==================== RÉCUPÉRATION DES PRODUITS (RTDB) ====================
        async function getProducts(storeId = null) {
            const snapshot = await db.ref('inventory').once('value');
            const products = [];
            snapshot.forEach(child => {
                const prod = { id: child.key, ...child.val() };
                if (storeId && prod.storeId !== storeId) return;
                products.push(prod);
            });
            return products;
        }

        // ==================== RENDU DES ONGLETS ====================
        function renderDashboard() {
            const role = currentUserRole;
            const tabs = [
                { id: "dashboard", label: "📊 Tableau de Bord", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "inventory", label: "📦 Stock & Pièces", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "pos", label: "🛒 Vente (Scanner)", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "reorder", label: "🔄 Commandes (Réassort)", roles: ["super_admin", "store-manager"] },
                { id: "transfers", label: "🚚 Transfert Inter-Magasin", roles: ["super_admin", "store-manager"] },
                { id: "expenses", label: "💰 Dépenses / Bons d'Achat", roles: ["super_admin", "store-manager"] },
                { id: "credits", label: "💳 Crédits Clients", roles: ["super_admin", "store-manager", "vendeur"] }
            ];
            if (role === "super_admin") {
                tabs.push({ id: "stores", label: "🏢 Magasins", roles: ["super_admin"] });
                tabs.push({ id: "users", label: "👥 Utilisateurs", roles: ["super_admin"] });
                tabs.push({ id: "logs", label: "📜 Journaux", roles: ["super_admin"] });
                tabs.push({ id: "reports", label: "📄 Rapports", roles: ["super_admin"] });
            } else {
                tabs.push({ id: "reports", label: "📄 Rapports", roles: ["store-manager"] });
            }
            const tabNav = document.getElementById('tabNav');
            tabNav.innerHTML = tabs.filter(t => t.roles.includes(role)).map(t => `
                <button data-tab="${t.id}" class="px-4 py-2 rounded-t-lg font-medium transition ${activeTab === t.id ? 'bg-white text-indigo-700 border-b-2 border-indigo-600' : 'text-gray-600 hover:bg-gray-200'}">
                    ${t.label}
                </button>
            `).join('');
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.onclick = () => {
                    activeTab = btn.dataset.tab;
                    renderDashboard();
                };
            });

            const storeSelector = document.getElementById('storeSelectorContainer');
            if (role === "super_admin" || role === "store-manager") {
                const options = storesList.map(s => `<option value="${s.id}" ${currentStoreId === s.id ? 'selected' : ''}>${s.name}</option>`);
                storeSelector.innerHTML = `<select id="storeSelect" class="border rounded p-1 text-sm"><option value="">Tous (Admin)</option>${options}</select>`;
                document.getElementById('storeSelect').onchange = (e) => {
                    currentStoreId = e.target.value || null;
                    renderCurrentTab();
                };
            } else {
                const store = storesList.find(s => s.id === currentStoreId);
                storeSelector.innerHTML = `<span class="text-sm text-gray-600">${store ? store.name : 'Magasin'}</span>`;
            }
            renderCurrentTab();
        }

        async function renderCurrentTab() {
            const container = document.getElementById('mainContent');
            if (activeTab === "dashboard") await renderDashboardHome(container);
            else if (activeTab === "inventory") await renderInventory(container);
            else if (activeTab === "pos") await renderPOS(container);
            else if (activeTab === "reorder") await renderReorder(container);
            else if (activeTab === "transfers") await renderTransfers(container);
            else if (activeTab === "expenses") await renderExpenses(container);
            else if (activeTab === "credits") await renderCredits(container);
            else if (activeTab === "stores") await renderStores(container);
            else if (activeTab === "users") await renderUsers(container);
            else if (activeTab === "logs") await renderLogs(container);
            else if (activeTab === "reports") await renderReports(container);
        }

        // ==================== TABLEAU DE BORD ====================
        async function renderDashboardHome(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-xl shadow">
                        <h2 class="text-xl font-bold mb-3">🚨 Alertes Stock Faible</h2>
                        ${lowStock.length ? lowStock.map(p => `
                            <div class="alert-low-stock p-3 mb-2 rounded flex justify-between">
                                <span><strong>${p.ref}</strong> - ${p.designation}</span>
                                <span class="text-orange-600 font-bold">Stock: ${p.qty} / Seuil: ${p.min_threshold || 5}</span>
                            </div>
                        `).join('') : '<p class="text-green-600">✅ Aucun produit sous seuil</p>'}
                    </div>
                    <div class="bg-white p-5 rounded-xl shadow">
                        <h2 class="text-xl font-bold mb-3">📈 Actions Rapides</h2>
                        <button onclick="document.querySelector(\'[data-tab=\"inventory\"]\').click()" class="bg-indigo-100 w-full text-left p-2 rounded mb-2">➕ Gérer stock / Importer CSV</button>
                        <button onclick="document.querySelector(\'[data-tab=\"pos\"]\').click()" class="bg-green-100 w-full text-left p-2 rounded mb-2">🛒 Scanner & Vente</button>
                        <button onclick="document.querySelector(\'[data-tab=\"reorder\"]\').click()" class="bg-yellow-100 w-full text-left p-2 rounded">📦 Voir articles à commander</button>
                    </div>
                </div>
            `;
        }

        // ==================== GESTION STOCK ====================
        async function renderInventory(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <div class="flex justify-between flex-wrap">
                        <h2 class="text-2xl font-bold">Gestion Stock</h2>
                        <div><input type="file" id="csvUpload" accept=".csv" class="border"><button id="importCsvBtn" class="bg-green-600 text-white px-3 py-1 rounded">Importer CSV (Ref,Design,Qty,PrixAchat)</button></div>
                    </div>
                    <button id="addProductBtn" class="bg-indigo-600 text-white px-3 py-1 rounded mt-2 mb-3">➕ Nouvelle Pièce</button>
                    <table class="min-w-full border mt-3"><thead><tr><th>Ref</th><th>Désignation</th><th>Stock</th><th>Seuil Alerte</th><th>Prix Achat</th><th>Prix Vente</th><th>Actions</th></tr></thead><tbody id="inventoryTableBody"></tbody></table>
                </div>
            `;
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.ref}</td><td>${p.designation}</td>
                    <td><input type="number" data-id="${p.id}" class="stockInput w-20 border" value="${p.qty}"></td>
                    <td><input type="number" data-thresh="${p.id}" class="thresholdInput w-20 border" value="${p.min_threshold || 5}"></td>
                    <td>${p.purchasePrice} DH</td><td>${p.salePrice} DH</td>
                    <td><button class="updateStockBtn text-blue-600" data-id="${p.id}">Mettre à jour</button> | <button class="deleteProductBtn text-red-600" data-id="${p.id}">🗑️</button></td>
                </tr>
            `).join('');
            document.getElementById('addProductBtn').onclick = () => addProductModal();
            document.getElementById('importCsvBtn').onclick = () => importCSV();
            document.querySelectorAll('.updateStockBtn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.dataset.id;
                    const newQty = parseInt(document.querySelector(`.stockInput[data-id="${id}"]`).value);
                    const newThresh = parseInt(document.querySelector(`.thresholdInput[data-thresh="${id}"]`).value);
                    await db.ref('inventory/' + id).update({ qty: newQty, min_threshold: newThresh });
                    logAction(`Mise à jour stock ${id}`);
                    renderCurrentTab();
                };
            });
            document.querySelectorAll('.deleteProductBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer définitivement ?")) {
                        await db.ref('inventory/' + btn.dataset.id).remove();
                        logAction(`Produit supprimé ${btn.dataset.id}`);
                        renderCurrentTab();
                    }
                };
            });
        }

        async function addProductModal() {
            const ref = prompt("Référence (code barre)");
            const des = prompt("Désignation");
            const qty = parseInt(prompt("Quantité initiale")) || 0;
            const purchase = parseFloat(prompt("Prix Achat"));
            const seuil = parseInt(prompt("Seuil d'alerte (ex: 3)")) || 5;
            if (ref && des && purchase) {
                const salePrice = purchase * 1.20;
                const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                const newProductRef = db.ref('inventory').push();
                await newProductRef.set({
                    ref, designation: des, qty, purchasePrice: purchase, salePrice, min_threshold: seuil,
                    storeId: storeId, createdAt: new Date().toISOString()
                });
                logAction(`Ajout produit ${ref}`);
                renderCurrentTab();
            }
        }

        async function importCSV() {
            const file = document.getElementById('csvUpload').files[0];
            if (!file) return alert("Choisir un fichier CSV");
            const text = await file.text();
            const rows = text.split("\n").slice(1);
            for (let row of rows) {
                const cols = row.split(",");
                if (cols.length >= 28) {
                    const ref = cols[0].trim();
                    const designation = cols[1].trim();
                    const qty = parseInt(cols[3].trim()) || 0;
                    const purchasePrice = parseFloat(cols[27].trim()) || 0;
                    if (ref && designation) {
                        const salePrice = purchasePrice * 1.20;
                        const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                        await db.ref('inventory').push().set({
                            ref, designation, qty, purchasePrice, salePrice, min_threshold: 5,
                            storeId, createdAt: new Date().toISOString()
                        });
                    }
                }
            }
            alert("Import CSV terminé");
            renderCurrentTab();
        }

        // ==================== SCANNER & PANIER ====================
        function initBarcodeListener() {
            document.removeEventListener('keydown', barcodeKeyHandler);
            document.addEventListener('keydown', barcodeKeyHandler);
        }
        function barcodeKeyHandler(e) {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 3) {
                    e.preventDefault();
                    addProductToCartByBarcode(barcodeBuffer);
                    barcodeBuffer = "";
                    if (barcodeTimeout) clearTimeout(barcodeTimeout);
                }
                return;
            }
            if (e.key.length === 1) {
                barcodeBuffer += e.key;
                if (barcodeTimeout) clearTimeout(barcodeTimeout);
                barcodeTimeout = setTimeout(() => { barcodeBuffer = ""; }, 100);
            }
        }

        async function addProductToCartByBarcode(barcode) {
            const snapshot = await db.ref('inventory').orderByChild('ref').equalTo(barcode).once('value');
            let product = null;
            snapshot.forEach(child => {
                const p = { id: child.key, ...child.val() };
                if (currentUserRole !== 'super_admin' && p.storeId !== currentStoreId) return;
                product = p;
            });
            if (!product) { alert("Produit non trouvé"); return; }
            const existing = cartItems.find(i => i.id === product.id);
            if (existing) existing.qty++;
            else cartItems.push({ id: product.id, ref: product.ref, designation: product.designation, salePrice: product.salePrice, qty: 1 });
            renderCartUI();
        }

        function renderCartUI() {
            const cartDiv = document.getElementById('cartContainer');
            if (!cartDiv) return;
            const total = cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0);
            cartDiv.innerHTML = `
                <h3 class="font-bold text-lg">🛒 Panier</h3>
                ${cartItems.map((item, idx) => `
                    <div class="flex justify-between border-b py-2">
                        <span>${item.ref} - ${item.designation}</span>
                        <span>${item.qty} x ${item.salePrice} DH</span>
                        <button data-cartidx="${idx}" class="removeCartItem text-red-500">❌</button>
                    </div>
                `).join('')}
                <div class="font-bold mt-2">Total: ${total} DH</div>
                <div class="mt-3 flex gap-2">
                    <input id="customerName" placeholder="Nom client (crédit)" class="border p-1 flex-1">
                    <button id="sellCashBtn" class="bg-green-600 text-white px-3 py-1 rounded">Espèce</button>
                    <button id="sellCreditBtn" class="bg-orange-600 text-white px-3 py-1 rounded">Crédit</button>
                </div>
            `;
            document.querySelectorAll('.removeCartItem').forEach(btn => {
                btn.onclick = () => {
                    cartItems.splice(parseInt(btn.dataset.cartidx), 1);
                    renderCartUI();
                };
            });
            document.getElementById('sellCashBtn')?.addEventListener('click', () => finalizeSale(false));
            document.getElementById('sellCreditBtn')?.addEventListener('click', () => finalizeSale(true));
        }

        async function finalizeSale(isCredit) {
            if (cartItems.length === 0) return;
            const customer = document.getElementById('customerName')?.value || "Client inconnu";
            for (let item of cartItems) {
                const prodRef = db.ref('inventory/' + item.id);
                const snapshot = await prodRef.once('value');
                const currentStock = snapshot.val().qty;
                if (currentStock < item.qty) {
                    alert(`Stock insuffisant pour ${item.ref}`);
                    return;
                }
                await prodRef.update({ qty: currentStock - item.qty });
            }
            const saleRef = db.ref('sales').push();
            await saleRef.set({
                items: cartItems,
                total: cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0),
                customerName: customer,
                paid: !isCredit,
                date: new Date().toISOString(),
                storeId: currentStoreId,
                sellerId: currentUser.uid
            });
            if (isCredit) {
                await db.ref('debts').push().set({
                    customerName: customer,
                    amount: cartItems.reduce((s, i) => s + i.qty * i.salePrice, 0),
                    paid: false,
                    saleId: saleRef.key,
                    date: new Date().toISOString()
                });
            }
            logAction(`Vente ${isCredit ? 'crédit' : 'espèce'} de ${cartItems.length} articles`);
            cartItems = [];
            renderCartUI();
            renderCurrentTab();
        }

        async function renderPOS(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-xl shadow">
                        <h2 class="text-xl font-bold">🔍 Scanner / Recherche IA</h2>
                        <input type="text" id="aiSearchInput" placeholder="Chercher 'pompe eau' ou 'radiateur'..." class="w-full p-3 border rounded mt-2">
                        <div id="searchResults" class="mt-3"></div>
                    </div>
                    <div id="cartContainer" class="bg-white p-5 rounded-xl shadow"></div>
                </div>
            `;
            initBarcodeListener();
            renderCartUI();
            const searchInput = document.getElementById('aiSearchInput');
            searchInput.addEventListener('input', async (e) => {
                const keyword = e.target.value.toLowerCase();
                if (keyword.length < 2) return;
                const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
                const results = products.filter(p => p.designation.toLowerCase().includes(keyword) || p.ref.toLowerCase().includes(keyword));
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = results.slice(0, 10).map(p => `
                    <div class="border p-2 mb-1 flex justify-between items-center">
                        <span>${p.ref} - ${p.designation} (${p.qty} dispo)</span>
                        <button data-ref="${p.ref}" class="addBySearchBtn bg-indigo-500 text-white px-2 rounded">➕ Ajouter</button>
                    </div>
                `).join('');
                document.querySelectorAll('.addBySearchBtn').forEach(btn => {
                    btn.onclick = () => addProductToCartByBarcode(btn.dataset.ref);
                });
            });
        }

        // ==================== RÉASSORT ====================
        async function renderReorder(container) {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const filtered = (currentUserRole !== 'super_admin') ? lowStock.filter(p => p.storeId === currentStoreId) : lowStock;
            container.innerHTML = `
                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-2xl font-bold mb-4">📋 Articles à Commander (Stock ≤ Seuil)</h2>
                    <table class="min-w-full border">
                        <thead class="bg-gray-100"><tr><th>Magasin</th><th>Référence</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th></tr></thead>
                        <tbody>${filtered.map(p => `
                            <tr><td>${storesList.find(s => s.id === p.storeId)?.name || p.storeId}</td><td>${p.ref}</td><td>${p.designation}</td><td class="text-red-600 font-bold">${p.qty}</td><td>${p.min_threshold || 5}</td><td>${p.purchasePrice} DH</td></tr>
                        `).join('')}</tbody>
                    </table>
                    <button id="exportReorderBtn" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">📎 Exporter CSV Commande Fournisseur</button>
                </div>
            `;
            document.getElementById('exportReorderBtn')?.addEventListener('click', () => {
                let csv = "Référence,Désignation,Quantité à commander,Prix achat\n" + filtered.map(p => `${p.ref},${p.designation},${Math.max(p.min_threshold - p.qty + 5, 5)},${p.purchasePrice}`).join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "commandes_fournisseur.csv";
                link.click();
            });
        }

        // ==================== TRANSFERTS ====================
        async function renderTransfers(container) {
            const transfersSnapshot = await db.ref('transfers').once('value');
            const transfers = [];
            transfersSnapshot.forEach(child => transfers.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>🚚 Transfert Inter-Magasin</h2>
                    <select id="fromStore" class="border p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                    <select id="toStore" class="border p-2 ml-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                    <input id="transferRef" placeholder="Référence produit" class="border p-2 ml-2">
                    <input id="transferQty" type="number" placeholder="Quantité" class="border p-2 ml-2">
                    <button id="createTransferBtn" class="bg-blue-600 text-white p-2 rounded ml-2">Créer Transfert</button>
                    <div id="transfersList" class="mt-4">${transfers.map(t => `<div>${t.fromStore} → ${t.toStore} : ${t.ref} (${t.qty}) - ${t.status}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('createTransferBtn').onclick = async () => {
                const from = document.getElementById('fromStore').value;
                const to = document.getElementById('toStore').value;
                const ref = document.getElementById('transferRef').value;
                const qty = parseInt(document.getElementById('transferQty').value);
                await db.ref('transfers').push().set({ fromStore: from, toStore: to, ref, qty, status: "en attente", createdAt: new Date().toISOString() });
                logAction(`Transfert ${ref} de ${from} vers ${to}`);
                renderCurrentTab();
            };
        }

        // ==================== DÉPENSES ====================
        async function renderExpenses(container) {
            const snapshot = await db.ref('expenses').once('value');
            const expenses = [];
            snapshot.forEach(child => expenses.push(child.val()));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>💰 Enregistrer Bon d'Achat Fournisseur</h2>
                    <input id="supplier" placeholder="Fournisseur" class="border p-2"><input id="amountExp" type="number" placeholder="Montant" class="border p-2 ml-2"><input id="descExp" placeholder="Motif" class="border p-2 ml-2">
                    <button id="addExpenseBtn" class="bg-yellow-600 text-white p-2 rounded ml-2">Ajouter Dépense</button>
                    <div id="expenseList" class="mt-4">${expenses.map(e => `<div>${e.supplier} - ${e.amount} DH : ${e.desc}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('addExpenseBtn').onclick = async () => {
                await db.ref('expenses').push().set({
                    supplier: document.getElementById('supplier').value,
                    amount: parseFloat(document.getElementById('amountExp').value),
                    desc: document.getElementById('descExp').value,
                    date: new Date().toISOString()
                });
                renderCurrentTab();
            };
        }

        // ==================== CRÉDITS CLIENTS ====================
        async function renderCredits(container) {
            const snapshot = await db.ref('debts').orderByChild('paid').equalTo(false).once('value');
            const debts = [];
            snapshot.forEach(child => debts.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>💳 Crédits Clients</h2>
                    <table class="min-w-full border"><thead><tr><th>Client</th><th>Montant</th><th>Date</th><th>Action</th></tr></thead><tbody>
                        ${debts.map(d => `<tr><td>${d.customerName}</td><td>${d.amount} DH</td><td>${new Date(d.date).toLocaleDateString()}</td><td><button data-id="${d.id}" class="payDebtBtn bg-green-500 text-white px-2 rounded">Marquer Payé</button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            document.querySelectorAll('.payDebtBtn').forEach(btn => {
                btn.onclick = async () => {
                    await db.ref('debts/' + btn.dataset.id).update({ paid: true });
                    renderCurrentTab();
                };
            });
        }

        // ==================== GESTION MAGASINS ====================
        async function renderStores(container) {
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>🏢 Gestion Magasins</h2>
                    <input id="storeName" placeholder="Nom" class="border p-2"><input id="storeLocation" placeholder="Adresse" class="border p-2 ml-2">
                    <button id="addStoreBtn" class="bg-green-600 text-white p-2 rounded ml-2">Ajouter magasin</button>
                    <div id="storesList" class="mt-4">${storesList.map(s => `<div>${s.name} - ${s.location}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('addStoreBtn').onclick = async () => {
                await db.ref('stores').push().set({
                    name: document.getElementById('storeName').value,
                    location: document.getElementById('storeLocation').value,
                    createdAt: new Date().toISOString()
                });
                await loadStores();
                renderCurrentTab();
            };
        }

        // ==================== UTILISATEURS ====================
        async function renderUsers(container) {
            const snapshot = await db.ref('users').once('value');
            const users = [];
            snapshot.forEach(child => users.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="bg-white p-5 rounded-xl shadow">
                    <h2>👥 Gestion utilisateurs (Super Admin)</h2>
                    <input id="newUserEmail" placeholder="Email" class="border p-2"><select id="newUserRole" class="border p-2 ml-2"><option value="manager">Manager</option><option value="vendeur">Vendeur</option></select>
                    <select id="newUserStore" class="border p-2 ml-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                    <button id="createUserBtn" class="bg-indigo-600 text-white p-2 rounded ml-2">Créer utilisateur</button>
                    <div id="usersList" class="mt-4">${users.map(u => `<div>${u.email} - ${u.role} - magasin: ${u.storeId}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('createUserBtn').onclick = async () => {
                const email = document.getElementById('newUserEmail').value;
                const role = document.getElementById('newUserRole').value;
                const storeId = document.getElementById('newUserStore').value;
                const pwd = "password123";
                try {
                    const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await db.ref('users/' + userCred.user.uid).set({
                        name: email.split('@')[0],
                        email: email,
                        role: role,
                        storeId: storeId,
                        createdAt: new Date().toISOString()
                    });
                    alert(`Utilisateur créé. Mot de passe: ${pwd}`);
                    renderCurrentTab();
                } catch (err) {
                    alert("Erreur: " + err.message);
                }
            };
        }

        // ==================== JOURNAUX ====================
        async function renderLogs(container) {
            const snapshot = await db.ref('actionLogs').orderByChild('timestamp').limitToLast(50).once('value');
            const logs = [];
            snapshot.forEach(child => logs.push(child.val()));
            container.innerHTML = `<div class="bg-white p-5 rounded-xl shadow"><h2>📜 Journaux d'actions</h2><ul>${logs.reverse().map(l => `<li>${l.action} - ${l.user} - ${new Date(l.timestamp).toLocaleString()}</li>`).join('')}</ul></div>`;
        }

        // ==================== RAPPORTS ====================
        async function renderReports(container) {
            container.innerHTML = `<div class="print-area bg-white p-5 rounded-xl shadow"><h2 class="text-xl">📄 Rapport Mensuel</h2><button onclick="window.print()" class="bg-gray-700 text-white p-2 rounded no-print">🖨️ Imprimer</button><div id="reportContent">(Génération automatique des ventes du mois à implémenter)</div></div>`;
        }

        // ==================== AUTHENTIFICATION ====================
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            setInfo("Connexion en cours...");
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, pass);
                const uid = userCred.user.uid;
                const snapshot = await db.ref('users/' + uid).once('value');
                const userData = snapshot.val();
                if (!userData) {
                    await auth.signOut();
                    setInfo("Utilisateur non autorisé.", true);
                    return;
                }
                currentUser = { uid, email: userData.email, role: userData.role, storeId: userData.storeId };
                currentUserRole = userData.role;
                currentStoreId = userData.storeId;
                await loadStores();
                if (currentUserRole !== 'super_admin' && !currentStoreId && storesList.length) currentStoreId = storesList[0].id;
                document.getElementById('roleBadge').innerText = currentUserRole;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                renderDashboard();
                setInfo("");
            } catch (err) {
                setInfo("Email ou mot de passe incorrect", true);
                console.error(err);
            }
        };

        logoutBtn.onclick = async () => {
            await auth.signOut();
            window.location.reload();
        };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snapshot = await db.ref('users/' + user.uid).once('value');
                if (!snapshot.exists()) {
                    await auth.signOut();
                    window.location.reload();
                }
            }
        });

        initSuperAdmin();
    </script>
</body>
</html>
