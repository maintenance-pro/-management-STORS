    <script>

        // État global

        const authSection = document.getElementById('authSection');

        // Liste des emails autorisés à devenir super_admin (création auto)
        const AUTHORIZED_ADMINS = ['admin@store.com', 'lihanbello05@gmail.com'];

        function setMessage(msg, isError = false) {
            if (infoMessage) {
                infoMessage.innerText = msg;
                infoMessage.className = "text-center text-sm mt-3 " + (isError ? "text-red-400" : "text-green-400");

        // ========== GESTION UTILISATEUR & RÔLES ==========
        async function getOrCreateUserInRTDB(user) {
            const uid = user.uid;
            const email = user.email;
            const snapshot = await db.ref('users/' + uid).once('value');
            if (snapshot.exists()) return snapshot.val();
            if (AUTHORIZED_ADMINS.includes(email)) {
                const userData = {
                    name: email.split('@')[0],
                    email: email,
                    role: 'super_admin',
                    storeId: null,
                    createdAt: new Date().toISOString()
                };
                await db.ref('users/' + uid).set(userData);
                return userData;
            }
            return null;
        }

        async function loadStores() {
            const snapshot = await db.ref('stores').once('value');
            const stores = [];
            snapshot.forEach(child => stores.push({ id: child.key, ...child.val() }));
            if (stores.length === 0 && currentUserRole === 'super_admin') {
                // Création de magasins par défaut
                await db.ref('stores').push().set({ name: "Magasin Central", location: "Casablanca", createdAt: new Date().toISOString() });
                await db.ref('stores').push().set({ name: "Magasin Sud", location: "Marrakech", createdAt: new Date().toISOString() });
                return loadStores();
            }
            storesList = stores;
            return storesList;
        }

        async function logAction(action, details = {}) {
            if (!currentUser) return;
            await db.ref('actionLogs').push().set({
                action: action,
                user: currentUser.email,
                details: details,
                timestamp: new Date().toISOString()
            });
        }

        // ========== PRODUITS ==========
        async function getProducts(storeId = null) {
            const snapshot = await db.ref('inventory').once('value');
            const products = [];
            snapshot.forEach(child => {
                const prod = { id: child.key, ...child.val() };
                if (storeId && prod.storeId !== storeId) return;
                products.push(prod);
            });
            return products;
        }

        // ========== SORTIE INTELLIGENTE (quantité à retirer) ==========
        async function withdrawStock(productId, currentQty, withdrawQty, reason = "vente") {
            if (withdrawQty <= 0) throw new Error("Quantité invalide");
            if (withdrawQty > currentQty) throw new Error("Stock insuffisant");
            const newQty = currentQty - withdrawQty;
            await db.ref('inventory/' + productId).update({ qty: newQty });
            // Enregistrer dans l'historique
            const productSnap = await db.ref('inventory/' + productId).once('value');
            const product = productSnap.val();
            await db.ref('history').push().set({
                productId: productId,
                productRef: product.ref,
                productName: product.designation,
                quantity: withdrawQty,
                oldStock: currentQty,
                newStock: newQty,
                reason: reason,
                userId: currentUser.uid,
                userEmail: currentUser.email,
                storeId: product.storeId,
                date: new Date().toISOString()
            });
            return newQty;
        }

        // ========== IMPORT CSV ==========
        async function importCSVData(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/);
                    if (lines.length === 0) return reject("Fichier vide");
                    const headers = lines[0].split(/[;,]/).map(h => h.trim().toLowerCase());
                    const idxRef = headers.findIndex(h => h.includes("n° de pièce") || h.includes("ref") || h.includes("reference"));
                    const idxDesign = headers.findIndex(h => h.includes("nom") || h.includes("designation") || h.includes("désignation"));
                    const idxQty = headers.findIndex(h => h.includes("quantité physiq") || h.includes("qty") || h.includes("stock"));
                    const idxPrice = headers.findIndex(h => h.includes("prix moyen") || h.includes("prix achat") || h.includes("purchase"));
                    if (idxRef === -1 || idxDesign === -1) return reject("Colonnes obligatoires manquantes");
                    const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                    let imported = 0;
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(/[;,]/);
                        if (cols.length < Math.max(idxRef, idxDesign, idxQty, idxPrice) + 1) continue;
                        const ref = cols[idxRef]?.trim();
                        const designation = cols[idxDesign]?.trim();
                        if (!ref || !designation) continue;
                        const qty = parseInt(cols[idxQty]) || 0;
                        const purchasePrice = parseFloat(cols[idxPrice]) || 0;
                        const salePrice = purchasePrice * 1.20;
                        const min_threshold = 5;
                        await db.ref('inventory').push().set({
                            ref, designation, qty, purchasePrice, salePrice, min_threshold,
                            storeId: storeId,
                            createdAt: new Date().toISOString()
                        });
                        imported++;
                    }
                    resolve(imported);
                };
                reader.onerror = reject;
                reader.readAsText(file, "ISO-8859-1");
            });
        }

        // ========== EXPORT EXCEL COMMANDES ==========
        async function exportSupplierOrders() {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const data = lowStock.map(p => ({
                "Référence": p.ref,
                "Désignation": p.designation,
                "Stock actuel": p.qty,
                "Seuil alerte": p.min_threshold || 5,
                "Quantité à commander": Math.max((p.min_threshold || 5) - p.qty + 5, 5),
                "Prix achat (DH)": p.purchasePrice,
                "Total (DH)": Math.max((p.min_threshold || 5) - p.qty + 5, 5) * p.purchasePrice,
                "Magasin": storesList.find(s => s.id === p.storeId)?.name || p.storeId
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Commandes_Fournisseurs");
            XLSX.writeFile(wb, `commandes_${new Date().toISOString().slice(0,19)}.xlsx`);
        }

        // ========== RENDU DES ONGLETS ==========

            const role = currentUserRole;
            const tabs = [
                { id: "dashboard", label: "📊 Tableau de Bord", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "inventory", label: "📦 Stock & Pièces", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "withdraw", label: "📤 Sortie de Stock", roles: ["super_admin", "store-manager", "vendeur"] },
                { id: "history", label: "📜 Historique", roles: ["super_admin", "store-manager"] },
                { id: "reorder", label: "🔄 Commandes (Réassort)", roles: ["super_admin", "store-manager"] },
                { id: "transfers", label: "🚚 Transfert", roles: ["super_admin", "store-manager"] },
                { id: "expenses", label: "💰 Dépenses", roles: ["super_admin", "store-manager"] },
                { id: "credits", label: "💳 Crédits", roles: ["super_admin", "store-manager", "vendeur"] }
            ];
            if (role === "super_admin") {
                tabs.push({ id: "stores", label: "🏢 Magasins", roles: ["super_admin"] });
                tabs.push({ id: "users", label: "👥 Utilisateurs", roles: ["super_admin"] });
                tabs.push({ id: "logs", label: "📜 Journaux", roles: ["super_admin"] });
                tabs.push({ id: "reports", label: "📄 Rapports", roles: ["super_admin"] });
            }
            const tabNav = document.getElementById('tabNav');
            tabNav.innerHTML = tabs.filter(t => t.roles.includes(role)).map(t => `
                <button data-tab="${t.id}" class="px-4 py-2 rounded-t-lg font-medium transition ${activeTab === t.id ? 'tab-active' : 'tab-inactive'}">

            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.onclick = () => { activeTab = btn.dataset.tab; renderDashboard(); };
            });

            const storeSelector = document.getElementById('storeSelectorContainer');
            if (role === "super_admin" || role === "store-manager") {
                const options = storesList.map(s => `<option value="${s.id}" ${currentStoreId === s.id ? 'selected' : ''}>${s.name}</option>`);
                storeSelector.innerHTML = `<select id="storeSelect" class="border rounded p-1 text-sm bg-gray-700"><option value="">Tous (Admin)</option>${options}</select>`;
                document.getElementById('storeSelect').onchange = (e) => { currentStoreId = e.target.value || null; renderCurrentTab(); };
            } else {
                const store = storesList.find(s => s.id === currentStoreId);
                storeSelector.innerHTML = `<span class="text-sm text-gray-400">${store ? store.name : 'Magasin'}</span>`;
            }
            renderCurrentTab();
        }

        async function renderCurrentTab() {
            const container = document.getElementById('mainContent');
            if (activeTab === "dashboard") await renderDashboardHome(container);
            else if (activeTab === "inventory") await renderInventory(container);
            else if (activeTab === "withdraw") await renderWithdraw(container);
            else if (activeTab === "history") await renderHistory(container);
            else if (activeTab === "reorder") await renderReorder(container);
            else if (activeTab === "transfers") await renderTransfers(container);
            else if (activeTab === "expenses") await renderExpenses(container);
            else if (activeTab === "credits") await renderCredits(container);
            else if (activeTab === "stores") await renderStores(container);
            else if (activeTab === "users") await renderUsers(container);
            else if (activeTab === "logs") await renderLogs(container);
            else if (activeTab === "reports") await renderReports(container);
        }

                            </div>

                    </div>

                        <button onclick="document.querySelector('[data-tab=\"inventory\"]').click()" class="btn-primary w-full text-left p-2 rounded mb-2">➕ Gérer stock / Importer CSV</button>
                        <button onclick="document.querySelector('[data-tab=\"withdraw\"]').click()" class="btn-primary w-full text-left p-2 rounded mb-2">📤 Sortie de stock</button>
                        <button onclick="document.querySelector('[data-tab=\"reorder\"]').click()" class="btn-warning w-full text-left p-2 rounded mb-2">📦 Voir articles à commander</button>
                        ${currentUserRole === 'super_admin' ? `<button id="exportOrdersBtn" class="bg-green-700 w-full text-left p-2 rounded">📎 Exporter commandes (Excel)</button>` : ''}

            if (currentUserRole === 'super_admin') {

        // ========== GESTION STOCK ==========
        async function renderInventory(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `
                <div class="card-industry p-5">
                    <div class="flex justify-between flex-wrap gap-2">
                        <h2 class="text-2xl font-bold">Gestion Stock</h2>
                        <div class="flex gap-2">
                            <input type="file" id="csvUpload" accept=".csv" class="bg-gray-700">
                            <button id="importCsvBtn" class="btn-primary text-white px-3 py-1 rounded">Importer CSV</button>
                        </div>
                    </div>
                    <button id="addProductBtn" class="btn-primary text-white px-3 py-1 rounded mt-2 mb-3">➕ Nouvelle Pièce</button>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border border-gray-700 mt-3">
                            <thead><tr class="bg-gray-800"><th class="p-2">Ref</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Prix Vente</th><th>Actions</th></tr></thead>
                            <tbody id="inventoryTableBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
            const tbody = document.getElementById('inventoryTableBody');

                    <td class="p-2">${p.ref}</td><td>${p.designation}</td>
                    <td><input type="number" data-id="${p.id}" class="stockInput w-20 bg-gray-700" value="${p.qty}"></td>
                    <td><input type="number" data-thresh="${p.id}" class="thresholdInput w-20 bg-gray-700" value="${p.min_threshold || 5}"></td>
                    <td>${p.purchasePrice} DH</td><td>${p.salePrice} DH</td>
                    <td><button class="updateStockBtn text-blue-400" data-id="${p.id}">💾</button> <button class="deleteProductBtn text-red-400" data-id="${p.id}">🗑️</button></td>
                </tr>
            `).join('');
            document.getElementById('addProductBtn').onclick = () => addProductModal();
            document.getElementById('importCsvBtn').onclick = () => {
                const file = document.getElementById('csvUpload').files[0];
                if (!file) return alert("Sélectionnez un fichier CSV");
                importCSVData(file).then(count => {
                    alert(`${count} produits importés`);
                    renderCurrentTab();

            };
            document.querySelectorAll('.updateStockBtn').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.dataset.id;
                    const newQty = parseInt(document.querySelector(`.stockInput[data-id="${id}"]`).value);
                    const newThresh = parseInt(document.querySelector(`.thresholdInput[data-thresh="${id}"]`).value);
                    await db.ref('inventory/' + id).update({ qty: newQty, min_threshold: newThresh });
                    logAction(`Mise à jour stock ${id}`, { newQty, newThresh });
                    renderCurrentTab();
                };

                    if (confirm("Supprimer définitivement ?")) {
                        await db.ref('inventory/' + btn.dataset.id).remove();
                        logAction(`Produit supprimé ${btn.dataset.id}`);
                        renderCurrentTab();
                    }
                };
            });
        }

        async function addProductModal() {
            const ref = prompt("Référence (code barre)");
            const des = prompt("Désignation");
            const qty = parseInt(prompt("Quantité initiale")) || 0;
            const purchase = parseFloat(prompt("Prix Achat"));

            if (ref && des && purchase) {
                const salePrice = purchase * 1.20;
                const storeId = (currentUserRole !== 'super_admin') ? currentStoreId : (storesList[0]?.id);
                await db.ref('inventory').push().set({
                    ref, designation: des, qty, purchasePrice: purchase, salePrice, min_threshold: seuil,
                    storeId: storeId, createdAt: new Date().toISOString()
                });
                logAction(`Ajout produit ${ref}`);
                renderCurrentTab();
            }
        }

        // ========== SORTIE DE STOCK (quantité à retirer) ==========
        async function renderWithdraw(container) {
            const products = await getProducts(currentUserRole !== 'super_admin' ? currentStoreId : null);
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">📤 Sortie de stock (Retrait intelligent)</h2>
                    <div class="mb-4">
                        <label class="block mb-1">Sélectionner un produit</label>
                        <select id="withdrawProductSelect" class="w-full bg-gray-700">
                            <option value="">-- Choisir --</option>
                            ${products.map(p => `<option value="${p.id}" data-stock="${p.qty}" data-name="${p.designation}" data-ref="${p.ref}">${p.ref} - ${p.designation} (Stock: ${p.qty})</option>`).join('')}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block mb-1">Quantité à retirer</label>
                        <input type="number" id="withdrawQty" class="w-full bg-gray-700" min="1">
                    </div>
                    <div class="mb-4">
                        <label class="block mb-1">Motif</label>
                        <select id="withdrawReason" class="w-full bg-gray-700">
                            <option value="vente">Vente</option>
                            <option value="casse">Casse / Perte</option>
                            <option value="transfert">Transfert</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                    <button id="executeWithdrawBtn" class="btn-primary text-white px-4 py-2 rounded">Effectuer le retrait</button>
                    <div id="withdrawMessage" class="mt-4 text-sm"></div>
                </div>
            `;
            const select = document.getElementById('withdrawProductSelect');
            const qtyInput = document.getElementById('withdrawQty');
            const btn = document.getElementById('executeWithdrawBtn');
            const msgDiv = document.getElementById('withdrawMessage');
            btn.onclick = async () => {
                const productId = select.value;
                if (!productId) { msgDiv.innerText = "Veuillez sélectionner un produit"; return; }
                const withdrawQty = parseInt(qtyInput.value);
                if (isNaN(withdrawQty) || withdrawQty <= 0) { msgDiv.innerText = "Quantité invalide"; return; }
                const selectedOption = select.options[select.selectedIndex];
                const currentStock = parseInt(selectedOption.dataset.stock);
                if (withdrawQty > currentStock) {
                    msgDiv.innerText = `❌ Stock insuffisant (${currentStock} disponible)`;
                    return;
                }
                try {
                    const newStock = await withdrawStock(productId, currentStock, withdrawQty, document.getElementById('withdrawReason').value);
                    msgDiv.innerText = `✅ Retrait effectué. Nouveau stock : ${newStock}`;
                    setTimeout(() => renderCurrentTab(), 1500);
                } catch (err) {
                    msgDiv.innerText = `❌ Erreur : ${err.message}`;
                }
            };
        }

        // ========== HISTORIQUE ==========
        async function renderHistory(container) {
            const snapshot = await db.ref('history').orderByChild('date').limitToLast(100).once('value');
            const history = [];
            snapshot.forEach(child => history.push({ id: child.key, ...child.val() }));
            history.reverse();
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">📜 Historique des sorties de stock</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border border-gray-700">
                            <thead class="bg-gray-800"><tr><th>Date</th><th>Référence</th><th>Produit</th><th>Quantité retirée</th><th>Stock avant</th><th>Stock après</th><th>Motif</th><th>Utilisateur</th></tr></thead>
                            <tbody>
                                ${history.map(h => `
                                    <tr class="border-b border-gray-700">
                                        <td class="p-2">${new Date(h.date).toLocaleString()}</td>
                                        <td>${h.productRef || ''}</td>
                                        <td>${h.productName || ''}</td>
                                        <td class="text-[#ffcc00] font-bold">${h.quantity}</td>
                                        <td>${h.oldStock}</td>
                                        <td>${h.newStock}</td>
                                        <td>${h.reason || 'vente'}</td>
                                        <td>${h.userEmail || ''}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // ========== RÉASSORT ==========
        async function renderReorder(container) {
            const products = await getProducts(null);
            const lowStock = products.filter(p => p.qty <= (p.min_threshold || 5));
            const filtered = (currentUserRole !== 'super_admin') ? lowStock.filter(p => p.storeId === currentStoreId) : lowStock;
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2 class="text-2xl font-bold mb-4">📋 Articles à Commander (Stock ≤ Seuil)</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border border-gray-700">
                            <thead class="bg-gray-800"><tr><th>Magasin</th><th>Référence</th><th>Désignation</th><th>Stock</th><th>Seuil</th><th>Prix Achat</th><th>Qté à commander</th></tr></thead>
                            <tbody>
                                ${filtered.map(p => `
                                    <tr class="border-b border-gray-700">
                                        <td class="p-2">${storesList.find(s => s.id === p.storeId)?.name || p.storeId}</td>
                                        <td>${p.ref}</td><td>${p.designation}</td>
                                        <td class="text-[#ffcc00] font-bold">${p.qty}</td>
                                        <td>${p.min_threshold || 5}</td>
                                        <td>${p.purchasePrice} DH</td>
                                        <td>${Math.max((p.min_threshold||5) - p.qty + 5, 5)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button id="exportReorderBtn" class="btn-primary text-white px-4 py-2 rounded mt-4">📎 Exporter CSV</button>
                    ${currentUserRole === 'super_admin' ? '<button id="exportExcelBtn" class="bg-green-700 text-white px-4 py-2 rounded mt-4 ml-2">📊 Exporter Excel</button>' : ''}
                </div>
            `;
            document.getElementById('exportReorderBtn')?.addEventListener('click', () => {
                let csv = "Référence,Désignation,Quantité à commander,Prix achat\n" + filtered.map(p => `${p.ref},${p.designation},${Math.max(p.min_threshold - p.qty + 5, 5)},${p.purchasePrice}`).join("\n");
                const blob = new Blob([csv], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "commandes_fournisseur.csv";
                link.click();
            });
            if (currentUserRole === 'super_admin') {
                document.getElementById('exportExcelBtn')?.addEventListener('click', exportSupplierOrders);
            }
        }

        // ========== TRANSFERTS ==========
        async function renderTransfers(container) {
            const transfersSnapshot = await db.ref('transfers').once('value');
            const transfers = [];
            transfersSnapshot.forEach(child => transfers.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2>🚚 Transfert Inter-Magasin</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <select id="fromStore" class="bg-gray-700 p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <select id="toStore" class="bg-gray-700 p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <input id="transferRef" placeholder="Référence produit" class="bg-gray-700 p-2">
                        <input id="transferQty" type="number" placeholder="Quantité" class="bg-gray-700 p-2">
                        <button id="createTransferBtn" class="btn-primary text-white p-2 rounded">Créer Transfert</button>
                    </div>
                    <div id="transfersList" class="mt-4">${transfers.map(t => `<div class="border-b border-gray-700 py-1">${t.fromStore} → ${t.toStore} : ${t.ref} (${t.qty}) - ${t.status}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('createTransferBtn').onclick = async () => {
                const from = document.getElementById('fromStore').value;
                const to = document.getElementById('toStore').value;
                const ref = document.getElementById('transferRef').value;
                const qty = parseInt(document.getElementById('transferQty').value);
                await db.ref('transfers').push().set({ fromStore: from, toStore: to, ref, qty, status: "en attente", createdAt: new Date().toISOString() });
                logAction(`Transfert ${ref} de ${from} vers ${to}`);
                renderCurrentTab();
            };
        }

        // ========== DÉPENSES ==========
        async function renderExpenses(container) {
            const snapshot = await db.ref('expenses').once('value');
            const expenses = [];
            snapshot.forEach(child => expenses.push(child.val()));
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2>💰 Enregistrer Bon d'Achat Fournisseur</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="supplier" placeholder="Fournisseur" class="bg-gray-700 p-2">
                        <input id="amountExp" type="number" placeholder="Montant" class="bg-gray-700 p-2">
                        <input id="descExp" placeholder="Motif" class="bg-gray-700 p-2">
                        <button id="addExpenseBtn" class="btn-primary text-white p-2 rounded">Ajouter Dépense</button>
                    </div>
                    <div id="expenseList" class="mt-4">${expenses.map(e => `<div>${e.supplier} - ${e.amount} DH : ${e.desc}</div>`).join('')}</div>
                </div>
            `;
            document.getElementById('addExpenseBtn').onclick = async () => {
                await db.ref('expenses').push().set({
                    supplier: document.getElementById('supplier').value,
                    amount: parseFloat(document.getElementById('amountExp').value),
                    desc: document.getElementById('descExp').value,
                    date: new Date().toISOString()
                });
                renderCurrentTab();
            };
        }

        // ========== CRÉDITS CLIENTS ==========
        async function renderCredits(container) {
            const snapshot = await db.ref('debts').orderByChild('paid').equalTo(false).once('value');
            const debts = [];
            snapshot.forEach(child => debts.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2>💳 Crédits Clients</h2>
                    <table class="min-w-full border border-gray-700"><thead><tr><th>Client</th><th>Montant</th><th>Date</th><th>Action</th></tr></thead><tbody>
                        ${debts.map(d => `<tr><td class="p-2">${d.customerName}</td><td>${d.amount} DH</td><td>${new Date(d.date).toLocaleDateString()}</td><td><button data-id="${d.id}" class="payDebtBtn bg-green-700 text-white px-2 rounded">Marquer Payé</button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            `;
            document.querySelectorAll('.payDebtBtn').forEach(btn => {
                btn.onclick = async () => {
                    await db.ref('debts/' + btn.dataset.id).update({ paid: true });
                    renderCurrentTab();
                };
            });
        }

        // ========== GESTION MAGASINS (CORRIGÉE) ==========
        async function renderStores(container) {
            await loadStores();
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2>🏢 Gestion Magasins</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="storeName" placeholder="Nom du magasin" class="bg-gray-700 p-2 flex-1">
                        <input id="storeLocation" placeholder="Adresse" class="bg-gray-700 p-2 flex-1">
                        <button id="addStoreBtn" class="btn-primary text-white p-2 rounded">➕ Ajouter magasin</button>
                    </div>
                    <div id="storesList" class="mt-4">
                        ${storesList.map(s => `
                            <div class="flex justify-between items-center border-b border-gray-700 py-2">
                                <div><strong>${s.name}</strong> - ${s.location || ''}</div>
                                <button data-id="${s.id}" class="deleteStoreBtn bg-red-700 text-white px-2 py-1 rounded text-sm">Supprimer</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('addStoreBtn').onclick = async () => {
                const name = document.getElementById('storeName').value.trim();
                const location = document.getElementById('storeLocation').value.trim();
                if (!name) return alert("Nom requis");
                await db.ref('stores').push().set({
                    name: name,
                    location: location,
                    createdAt: new Date().toISOString()
                });
                await loadStores();
                renderCurrentTab();
            };
            document.querySelectorAll('.deleteStoreBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer ce magasin ?")) {
                        await db.ref('stores/' + btn.dataset.id).remove();
                        await loadStores();
                        renderCurrentTab();
                    }
                };
            });
        }

        // ========== UTILISATEURS (multi-admin) ==========
        async function renderUsers(container) {
            const snapshot = await db.ref('users').once('value');
            const users = [];
            snapshot.forEach(child => users.push({ id: child.key, ...child.val() }));
            container.innerHTML = `
                <div class="card-industry p-5">
                    <h2>👥 Gestion utilisateurs (Super Admin)</h2>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <input id="newUserEmail" placeholder="Email" class="bg-gray-700 p-2 flex-1">
                        <select id="newUserRole" class="bg-gray-700 p-2"><option value="manager">Manager</option><option value="vendeur">Vendeur</option><option value="super_admin">Super Admin</option></select>
                        <select id="newUserStore" class="bg-gray-700 p-2">${storesList.map(s => `<option value="${s.id}">${s.name}</option>`)}</select>
                        <button id="createUserBtn" class="btn-primary text-white p-2 rounded">Créer</button>
                    </div>
                    <div class="mt-4">
                        ${users.map(u => `
                            <div class="flex justify-between items-center border-b border-gray-700 py-2">
                                <div>${u.email} - <strong>${u.role}</strong> ${u.storeId ? '(magasin: '+storesList.find(s=>s.id===u.storeId)?.name+')' : ''}</div>
                                ${u.email !== currentUser?.email ? `<button data-id="${u.id}" class="deleteUserBtn bg-red-700 text-white px-2 py-1 rounded text-sm">Supprimer</button>` : '<span class="text-gray-500 text-sm">(vous)</span>'}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('createUserBtn').onclick = async () => {
                const email = document.getElementById('newUserEmail').value;
                const role = document.getElementById('newUserRole').value;
                const storeId = document.getElementById('newUserStore').value;
                const pwd = "password123";
                try {
                    const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await db.ref('users/' + userCred.user.uid).set({
                        name: email.split('@')[0],
                        email: email,
                        role: role,
                        storeId: storeId,
                        createdAt: new Date().toISOString()
                    });
                    alert(`Utilisateur créé. Mot de passe: ${pwd}`);
                    renderCurrentTab();
                } catch (err) {
                    alert("Erreur: " + err.message);
                }
            };
            document.querySelectorAll('.deleteUserBtn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm("Supprimer cet utilisateur ?")) {
                        await db.ref('users/' + btn.dataset.id).remove();
                        renderCurrentTab();
                    }
                };
            });
        }

        // ========== JOURNAUX ==========
        async function renderLogs(container) {
            const snapshot = await db.ref('actionLogs').orderByChild('timestamp').limitToLast(50).once('value');
            const logs = [];
            snapshot.forEach(child => logs.push(child.val()));
            container.innerHTML = `<div class="card-industry p-5"><h2>📜 Journaux d'actions</h2><ul class="list-disc pl-5">${logs.reverse().map(l => `<li>${l.action} - ${l.user} - ${new Date(l.timestamp).toLocaleString()}</li>`).join('')}</ul></div>`;
        }

        // ========== RAPPORTS ==========
        async function renderReports(container) {
            container.innerHTML = `<div class="card-industry p-5 print-area"><h2 class="text-xl">📄 Rapport Mensuel</h2><button onclick="window.print()" class="btn-primary text-white p-2 rounded no-print">🖨️ Imprimer</button><div id="reportContent">(Génération automatique à implémenter)</div></div>`;
        }

        // ========== AUTHENTIFICATION ==========
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!password) { setMessage("Veuillez saisir le mot de passe.", true); return; }
            setMessage("🔐 Connexion en cours...");
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;
                const userData = await getOrCreateUserInRTDB(user);
                if (!userData || userData.role !== 'super_admin') {
                    setMessage("⛔ Accès refusé : vous n'êtes pas super_admin.", true);
                    await auth.signOut();
                    return;
                }
                currentUser = { uid: user.uid, email: user.email, role: userData.role, storeId: userData.storeId };
                currentUserRole = userData.role;
                currentStoreId = userData.storeId;
                await loadStores();
                document.getElementById('roleBadge').innerText = currentUserRole;
                authSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                renderDashboard();
                setMessage("✅ Connexion réussie !");
            } catch (err) {
                setMessage("❌ " + (err.message || "Email ou mot de passe incorrect"), true);
            }
        };

        logoutBtn.onclick = async () => {
            await auth.signOut();
            authSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            setMessage("Déconnecté.");
        };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userData = await getOrCreateUserInRTDB(user);
                if (!userData || userData.role !== 'super_admin') {
                    await auth.signOut();
                    authSection.classList.remove('hidden');
                    dashboardSection.classList.add('hidden');
                } else {
                    currentUser = { uid: user.uid, email: user.email, role: userData.role, storeId: userData.storeId };
                    currentUserRole = userData.role;
                    currentStoreId = userData.storeId;
                    await loadStores();
                    document.getElementById('roleBadge').innerText = currentUserRole;
                    authSection.classList.add('hidden');
                    dashboardSection.classList.remove('hidden');
                    renderDashboard();
                }
            } else {
                authSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
